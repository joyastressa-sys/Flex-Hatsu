// ─── AUDIO ALARM ─────────────────────────────────────────────────────────────
function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const times = [0, 0.3, 0.6];
    times.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.25);
    });
  } catch(e) {}
}

// ─── COST CALCULATION (shared between Resumen, Historial, and date-range billing) ──
// Returns { byZone: [{name, cp, count, heavyCount, price, subtotal}], total, matchedCount, unmatchedCount }
function calcSessionCost(sessionLabels, zones, heavySkus) {
  const matched = (sessionLabels || []).filter(l => l.matched);

  // Normalize a string for fuzzy comparison: lowercase, remove dots/accents/extra spaces
  const norm = s => (s||'').toLowerCase()
    .replace(/\./g,'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ').trim();

  // Given a label, find the SINGLE best matching zone.
  // Priority: 1) exact CP match, 2) normalized text contains zone name as whole word, 3) null
  const findZone = (label) => {
    const lcp = (label.cp||'').trim();
    // Build a combined location string from partido + localidad for text matching
    const locText = [label.partido, label.loc].filter(Boolean).join(' ');
    const lLoc = norm(locText);

    // 1) CP exact match
    if (lcp) {
      const byCP = zones.filter(z => z.cp && z.cp.trim() === lcp);
      if (byCP.length === 1) return byCP[0];
      // Multiple zones with same CP → narrow down by loc text
      if (byCP.length > 1) {
        const locMatch = byCP.find(z => {
          const zn = norm(z.name);
          return lLoc === zn || new RegExp('(^|\\s)' + zn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(\\s|$)').test(lLoc);
        });
        if (locMatch) return locMatch;
        return byCP[0]; // still prefer CP match even without loc refinement
      }
    }

    // 2) Text match: zone name is fully contained in label's partido+loc (word boundary)
    // Sort by name length descending so more specific zones win
    const textCandidates = [...zones]
      .sort((a,b) => b.name.length - a.name.length)
      .filter(z => {
        const zn = norm(z.name);
        return lLoc === zn || new RegExp('(^|\\s)' + zn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(\\s|$)').test(lLoc);
      });
    if (textCandidates.length > 0) return textCandidates[0];

    return null; // no zone found
  };

  // Assign each matched label to exactly one zone
  const zoneMap = {}; // zoneName -> { zone, labels[] }
  const unzoned = [];

  matched.forEach(l => {
    const z = findZone(l);
    if (z) {
      if (!zoneMap[z.name]) zoneMap[z.name] = { zone: z, labels: [] };
      zoneMap[z.name].labels.push(l);
      // Track each unique label locality for display (show what the label says, not the zone name)
      if (!zoneMap[z.name].labelLocs) zoneMap[z.name].labelLocs = {};
      const lDisplay = [l.partido, l.loc].filter(Boolean).join(' / ') || l.cp || z.name;
      zoneMap[z.name].labelLocs[lDisplay] = (zoneMap[z.name].labelLocs[lDisplay]||0) + 1;
    } else {
      unzoned.push(l);
    }
  });

  const byZone = Object.values(zoneMap).map(({ zone, labels }) => {
    const heavyCount = labels.filter(l => heavySkus.includes(l.sku)).length;
    const subtotal = labels.length * zone.price + heavyCount * zone.price;
    // Build display: if all labels have same locality, show that; otherwise show "Zone (n localities)"
    const locs = Object.entries(zoneMap[zone.name]?.labelLocs || {});
    const displayName = locs.length === 1 ? locs[0][0] : locs.length === 0 ? zone.name : zone.name + ' (' + locs.map(([k,v])=>k+(v>1?' x'+v:'')).join(', ') + ')';
    return { name: zone.name, displayName, cp: zone.cp, count: labels.length, heavyCount, price: zone.price, subtotal };
  }).sort((a,b) => b.subtotal - a.subtotal);

  const total = byZone.reduce((sum, z) => sum + z.subtotal, 0);

  return {
    byZone,
    total,
    matchedCount: matched.length,
    unmatchedCount: (sessionLabels || []).filter(l => !l.matched).length,
    unzonedCount: unzoned.length,
    unzoned,
  };
}

// ─── PDF PARSER ──────────────────────────────────────────────────────────────
const pdfBufferCache = {}; // fileName -> ArrayBuffer (in-memory, this browser session only)

async function parseLabelsPDF(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buf = await file.arrayBuffer();
  // Keep a copy in memory so we can re-render any page in HD instantly, no upload needed
  const cacheKey = `${file.name}_${file.size}`;
  pdfBufferCache[cacheKey] = buf.slice(0); // slice(0) clones, since pdf.js consumes the buffer

  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const labels = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    const text = tc.items.map(it => it.str).join(' ');

    // Extract fields
    const shipId = (text.match(/Envio[:\s]+(\d[\d\s]{6,12}\d)/i) || [])[1]?.replace(/\s/g,'') || null;
    const packId = (text.match(/Pack ID[:\s]*([\d]+)/i) || [])[1] || null;
    const ventaId = (text.match(/Venta[:\s]+([\d\s]{10,})/i) || [])[1]?.replace(/\s/g,'') || null;
    const sku    = (text.match(/SKU[:\s:]*([A-Z0-9\-\/]+)/i) || [])[1] || null;
    const dest   = (text.match(/Destinatario[:\s]*([^\n(]+)/i) || [])[1]?.trim() || null;
    const dateM  = (text.match(/(\d{1,2}\s+(?:JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC|ENE|FEB|MAR|ABR|MAY|JUN|JUL|AGO|SEP|OCT|NOV|DIC))/i) || [])[1] || null;
    const seller = (text.match(/^([A-ZÁÉÍÓÚ\s]+)\s+#\d/m) || [])[1]?.trim() || null;

    // Extract destination CP and locality from the block AFTER the QR code.
    // The FLEX label structure (as plain text) is:
    //   ... FLEX 18 JUN CP: 1872 AVELLANEDA SARANDÍ RESIDENCIAL Direccion: ...
    // CP with colon is always the DESTINATION cp (sender uses "CP 1041" without colon).
    // We capture: CP: XXXX  PARTIDO  LOCALIDAD  (RESIDENCIAL|COMERCIAL)
    let cp = null;
    let loc = null;
    let partido = null;
    let tipoEnvio = null;

    const destBlock = text.match(/\bCP:\s*(\d{4,5})\s+([A-ZÁÉÍÓÚÜÑ][A-ZÁÉÍÓÚÜÑ\s\-]{2,35?}?)\s+([A-ZÁÉÍÓÚÜÑ][A-ZÁÉÍÓÚÜÑ\s\-]{2,35?}?)\s+(RESIDENCIAL|COMERCIAL)/i);
    if (destBlock) {
      cp      = destBlock[1]?.trim() || null;
      partido = destBlock[2]?.trim().replace(/\s+/g,' ') || null;
      loc     = destBlock[3]?.trim().replace(/\s+/g,' ') || null;
      tipoEnvio = destBlock[4]?.toUpperCase() || null;
    } else {
      // Fallback: just grab CP: number (still destination since we require the colon)
      const cpOnly = text.match(/\bCP:\s*(\d{4,5})/i);
      if (cpOnly) cp = cpOnly[1].trim();
    }

    // Render SMALL thumbnail only (lightweight, for the list view + Firestore storage)
    const viewport = page.getViewport({ scale: 0.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    const thumb = canvas.toDataURL('image/jpeg', 0.75);

    if (shipId || packId || ventaId) {
      const id = shipId || packId || ventaId;
      labels.push({ id, shipId, packId, ventaId, sku, cp, partido, dest, loc, tipoEnvio, dateLabel: dateM, seller, thumb, page: i, matched: false, text, pdfCacheKey: cacheKey, hdThumb: null });
    }
  }
  return labels;
}

// ─── HIGH-RES PAGE RENDER (on-demand, from in-memory PDF buffer — no upload/cloud needed) ──
async function renderHighResPage(cacheKey, pageNum) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buf = pdfBufferCache[cacheKey];
  if (!buf) throw new Error('PDF no disponible en memoria — recargá el PDF para ver en alta resolución');

  const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
  const page = await pdf.getPage(pageNum);
  const viewport = page.getViewport({ scale: 3 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return canvas.toDataURL('image/jpeg', 0.92);
}

// ─── LABEL IMAGE MODAL (HD render from in-memory PDF, or saved hdThumb fallback) ──
function LabelImageModal({ label, onClose }) {
  const [hdSrc, setHdSrc] = useState(label.hdThumb || null);
  const [loadingHd, setLoadingHd] = useState(false);
  const [hdError, setHdError] = useState(false);

  useEffect(() => {
    let cancelled = false;
    if (!label.hdThumb && label.pdfCacheKey && label.page) {
      setLoadingHd(true);
      setHdError(false);
      renderHighResPage(label.pdfCacheKey, label.page).then(src => {
        if (!cancelled) { setHdSrc(src); setLoadingHd(false); }
      }).catch(() => {
        if (!cancelled) { setHdError(true); setLoadingHd(false); }
      });
    }
    return () => { cancelled = true; };
  }, [label.pdfCacheKey, label.page, label.hdThumb]);

  const displaySrc = hdSrc || label.thumb;
  const statusMsg = label.hdThumb ? '✓ Alta resolución (guardada)'
    : loadingHd ? '⏳ Generando alta resolución desde el PDF...'
    : hdSrc ? '✓ Alta resolución'
    : hdError ? '⚠️ El PDF original ya no está en memoria — recargalo para ver en HD'
    : '';

  return (
    <div className="overlay" onClick={onClose} style={{padding:16,paddingTop:60,alignItems:'flex-start'}}>
      <div style={{position:'relative',width:'min(94vw, 480px)',maxHeight:'88vh',display:'flex',flexDirection:'column',alignItems:'center',margin:'0 auto'}} onClick={e=>e.stopPropagation()}>
        <button className="btn btn-ghost" onClick={onClose} style={{position:'absolute',top:-44,right:0}}>✕ Cerrar</button>
        {statusMsg && (
          <div style={{position:'absolute',top:-44,left:0,fontSize:12,color:'var(--muted)',lineHeight:'36px',maxWidth:'60%'}}>{statusMsg}</div>
        )}
        <div style={{width:'100%',maxHeight:'80vh',overflowY:'auto',borderRadius:8,border:'2px solid var(--border)',background:'#fff'}}>
          <img src={displaySrc} style={{width:'100%',height:'auto',display:'block'}} />
        </div>
        {label.id && (
          <div style={{marginTop:12,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 16px',fontSize:13,color:'var(--muted)',textAlign:'center',maxWidth:'96vw'}}>
            <strong style={{color:'var(--text)'}}>{label.id}</strong> · {label.dest||'—'} · {label.loc||'—'} · CP {label.cp||'—'}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CAMERA QR SCANNER (for mobile, no gun scanner available) ────────────────
function CameraScanner({ onResult, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const [error, setError] = useState(null);
  const [status, setStatus] = useState('Iniciando cámara...');
  const lastResultRef = useRef({ text: null, ts: 0 });

  useEffect(() => {
    let active = true;

    async function start() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        if (!active) { stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play();
        }
        setStatus('Apuntá al código QR');
        tick();
      } catch (err) {
        setError(err.name === 'NotAllowedError'
          ? 'Permiso de cámara denegado. Habilitalo en la configuración del navegador.'
          : 'No se pudo acceder a la cámara: ' + err.message);
      }
    }

    function tick() {
      if (!active) return;
      const video = videoRef.current;
      const canvas = canvasRef.current;
      if (video && canvas && video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          const now = Date.now();
          // Debounce: avoid firing the same code repeatedly while still in frame
          if (code.data !== lastResultRef.current.text || now - lastResultRef.current.ts > 2500) {
            lastResultRef.current = { text: code.data, ts: now };
            onResult(code.data);
          }
        }
      }
      rafRef.current = requestAnimationFrame(tick);
    }

    start();
    return () => {
      active = false;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  return (
    <div className="overlay" onClick={onClose} style={{padding:16}}>
      <div style={{position:'relative',width:'min(94vw, 480px)',display:'flex',flexDirection:'column',alignItems:'center'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',marginBottom:8}}>
          <span style={{fontSize:13,color:error?'var(--red)':'var(--muted)'}}>{error || status}</span>
          <button className="btn btn-ghost" onClick={onClose}>✕ Cerrar</button>
        </div>
        <div style={{width:'100%',aspectRatio:'1',borderRadius:8,overflow:'hidden',border:'2px solid var(--border)',position:'relative',background:'#000'}}>
          <video ref={videoRef} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover'}} />
          <div style={{position:'absolute',inset:'15%',border:'3px solid var(--accent)',borderRadius:12,opacity:.7,pointerEvents:'none'}} />
        </div>
        <canvas ref={canvasRef} style={{display:'none'}} />
        <p style={{color:'var(--muted)',fontSize:12,marginTop:10,textAlign:'center'}}>
          La cámara queda abierta — escaneá un paquete tras otro sin cerrar este modal
        </p>
      </div>
    </div>
  );
}

// ─── BILLING RANGE PANEL (date-range cost summary, for paying the courier) ───
function BillingRangePanel({ sessions, zones, heavySkus }) {
  const [from, setFrom] = useState('');
  const [to, setTo] = useState('');

  const inRange = sessions.filter(s => {
    if (from && s.date < from) return false;
    if (to && s.date > to) return false;
    return true;
  });

  const perSession = inRange.map(s => ({ date: s.date, cost: calcSessionCost(s.labels||[], zones, heavySkus) }));
  const grandTotal = perSession.reduce((sum, s) => sum + s.cost.total, 0);

  // Aggregate by zone across the whole range
  const zoneTotals = {};
  perSession.forEach(s => {
    s.cost.byZone.forEach(z => {
      if (!zoneTotals[z.name]) zoneTotals[z.name] = { name: z.name, count: 0, heavyCount: 0, subtotal: 0, price: z.price };
      zoneTotals[z.name].count += z.count;
      zoneTotals[z.name].heavyCount += z.heavyCount;
      zoneTotals[z.name].subtotal += z.subtotal;
    });
  });
  const zoneTotalsList = Object.values(zoneTotals).sort((a,b)=>b.subtotal-a.subtotal);

  const setQuickRange = (days) => {
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - (days - 1));
    setTo(end.toISOString().slice(0,10));
    setFrom(start.toISOString().slice(0,10));
  };

  return (
    <div className="card">
      <div className="card-title">💰 Liquidación por período</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-end',marginBottom:16}}>
        <div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Desde</label>
          <input type="date" className="input" value={from} onChange={e=>setFrom(e.target.value)} />
        </div>
        <div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Hasta</label>
          <input type="date" className="input" value={to} onChange={e=>setTo(e.target.value)} />
        </div>
        <button className="btn btn-ghost" onClick={()=>setQuickRange(7)}>Últimos 7 días</button>
        <button className="btn btn-ghost" onClick={()=>setQuickRange(15)}>Últimos 15 días</button>
        <button className="btn btn-ghost" onClick={()=>setQuickRange(30)}>Últimos 30 días</button>
        {(from || to) && <button className="btn btn-ghost" onClick={()=>{setFrom('');setTo('');}}>✕ Limpiar</button>}
      </div>

      {!from && !to ? (
        <p style={{color:'var(--muted)',fontSize:13}}>Elegí un rango de fechas para calcular el total a liquidar.</p>
      ) : inRange.length === 0 ? (
        <p style={{color:'var(--muted)',fontSize:13}}>No hay sesiones guardadas en ese rango.</p>
      ) : (
        <>
          <div className="stats" style={{marginBottom:16}}>
            <div className="stat"><div className="stat-val">{inRange.length}</div><div className="stat-label">Sesiones en el período</div></div>
            <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{perSession.reduce((s,x)=>s+x.cost.matchedCount,0)}</div><div className="stat-label">Total entregados</div></div>
            <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>${grandTotal.toLocaleString('es-AR')}</div><div className="stat-label">Total a liquidar</div></div>
          </div>

          {zoneTotalsList.length > 0 && (
            <div style={{overflowX:'auto',marginBottom:16}}>
              <table className="tbl">
                <thead><tr><th>Zona/Localidad</th><th>Cant. total</th><th>Pesados</th><th>Tarifa</th><th>Subtotal</th></tr></thead>
                <tbody>
                  {zoneTotalsList.map(z => (
                    <tr key={z.name}>
                      <td>{z.name}</td>
                      <td>{z.count}</td>
                      <td>{z.heavyCount > 0 ? <span className="badge badge-yellow">⚖️ {z.heavyCount}</span> : '—'}</td>
                      <td>${z.price.toLocaleString('es-AR')}</td>
                      <td style={{fontWeight:700}}>${z.subtotal.toLocaleString('es-AR')}</td>
                    </tr>
                  ))}
                  <tr>
                    <td colSpan={4} style={{fontWeight:700,textAlign:'right'}}>Total del período</td>
                    <td style={{fontWeight:800,color:'var(--accent)'}}>${grandTotal.toLocaleString('es-AR')}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}

          <details>
            <summary style={{cursor:'pointer',color:'var(--muted)',fontSize:13,marginBottom:8}}>Ver desglose por día</summary>
            <div style={{overflowX:'auto',marginTop:8}}>
              <table className="tbl">
                <thead><tr><th>Fecha</th><th>Entregados</th><th>Costo del día</th></tr></thead>
                <tbody>
                  {perSession.map(s => (
                    <tr key={s.date}>
                      <td>{s.date}</td>
                      <td>{s.cost.matchedCount}</td>
                      <td>${s.cost.total.toLocaleString('es-AR')}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </details>
        </>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [firebaseCfg, setFirebaseCfg] = useState(getStoredConfig);
  const [db, setDb] = useState(null);
  const [storage, setStorage] = useState(null);
  const [tab, setTab] = useState('sesion');
  const [toasts, setToasts] = useState([]);

  // App state
  const [session, setSession] = useState(null);       // active session doc
  const [labels, setLabels] = useState([]);            // labels from PDFs
  const [scans, setScans] = useState([]);              // scans this session
  const [heavySkus, setHeavySkus] = useState([]);      // heavy SKU list
  const [zones, setZones] = useState([]);              // zone tariff table
  const [loading, setLoading] = useState(false);
  const [scanInput, setScanInput] = useState('');
  const [pendingModal, setPendingModal] = useState(null);
  const [imgModal, setImgModal] = useState(null);
  const [selectedLabels, setSelectedLabels] = useState([]);
  const [cameraOpen, setCameraOpen] = useState(false);
  const [sessions, setSessions] = useState([]);        // past sessions
  const scanRef = useRef(null);

  // ── Init Firebase ──
  useEffect(() => {
    if (!firebaseCfg) return;
    try {
      let app;
      if (window.firebase.apps.length) app = window.firebase.app();
      else app = window.firebase.initializeApp(firebaseCfg);
      setDb(window.firebase.firestore(app));
      setStorage(window.firebase.storage(app));
    } catch(e) { addToast('Error Firebase','Verificá la configuración','error'); }
  }, [firebaseCfg]);

  // ── Load data from Firestore ──
  useEffect(() => {
    if (!db) return;
    // today's session
    const today = new Date().toISOString().slice(0,10);
    db.collection('sessions').where('date','==',today).limit(1).get().then(snap => {
      if (!snap.empty) {
        const d = snap.docs[0];
        const s = { id: d.id, ...d.data() };
        setSession(s);
        setLabels(s.labels || []);
        setScans(s.scans || []);
      }
    });
    // config
    db.collection('config').doc('heavy_skus').get().then(d => { if(d.exists) setHeavySkus(d.data().list||[]); });
    db.collection('config').doc('zones').get().then(d => { if(d.exists) setZones(d.data().list||[]); });
    // past sessions
    db.collection('sessions').orderBy('date','desc').limit(30).get().then(snap => {
      setSessions(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, [db]);

  // ── Check yesterday's unmatched on load ──
  useEffect(() => {
    if (!db || !session) return;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toISOString().slice(0,10);
    db.collection('sessions').where('date','==',yStr).limit(1).get().then(snap => {
      if (snap.empty) return;
      const d = snap.docs[0].data();
      const unmatched = (d.labels||[]).filter(l => !l.matched && !l.discarded);
      if (unmatched.length > 0) {
        setPendingModal({ sessionId: snap.docs[0].id, date: yStr, items: unmatched });
      }
    });
  }, [db, session?.id]);

  // ── Toast helpers ──
  const addToast = useCallback((title, body, type='info', actions=null) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, title, body, alarm: type==='alarm', actions }]);
    if (type === 'alarm') playAlarm();
    if (!actions) setTimeout(() => setToasts(p => p.filter(t=>t.id!==id)), 5000);
  }, []);

  const handleToastAction = useCallback((toastId, value) => {
    // value = 'add_scan' or 'ignore'
    if (value === 'add_scan' && db && session) {
      const raw = toasts.find(t=>t.id===toastId)?.scanRaw;
      if (!raw) return;
      const newScan = { raw, ts: new Date().toISOString(), matched: false, manual: true };
      const updated = [...scans, newScan];
      setScans(updated);
      db.collection('sessions').doc(session.id).update({ scans: updated });
    }
  }, [db, session, scans, toasts]);

  const dismissToast = id => setToasts(p => p.filter(t=>t.id!==id));

  // ── Open Session ──
  const openSession = async () => {
    if (!db) return;
    const today = new Date().toISOString().slice(0,10);
    setLoading(true);
    const existing = await db.collection('sessions').where('date','==',today).limit(1).get();
    if (!existing.empty) {
      const d = existing.docs[0];
      const s = { id: d.id, ...d.data() };
      setSession(s); setLabels(s.labels||[]); setScans(s.scans||[]);
    } else {
      const ref = await db.collection('sessions').add({ date: today, open: true, labels: [], scans: [], createdAt: new Date().toISOString() });
      const s = { id: ref.id, date: today, open: true, labels: [], scans: [] };
      setSession(s); setLabels([]); setScans([]);
    }
    setLoading(false);
  };

  // ── Close Session ──
  const closeSession = async () => {
    if (!db || !session) return;
    setLoading(true);
    try {
      // Generate HD snapshots for unmatched labels while their PDF is still in memory,
      // so they can be viewed clearly later even after the page reloads.
      const stillUnmatched = labels.filter(l => !l.matched);
      const updatedLabels = await Promise.all(labels.map(async (l) => {
        if (l.matched || l.hdThumb || !l.pdfCacheKey) return l;
        try {
          const hd = await renderHighResPage(l.pdfCacheKey, l.page);
          return { ...l, hdThumb: hd };
        } catch {
          return l; // PDF no longer in memory, keep as-is
        }
      }));
      const toPersist = updatedLabels.map(({pdfCacheKey, ...rest}) => rest);
      await db.collection('sessions').doc(session.id).update({ labels: toPersist, open: false, closedAt: new Date().toISOString() });
      setLabels(updatedLabels);
      setSession(p => ({...p, open: false}));
      const m = updatedLabels.filter(l=>l.matched).length;
      const u = updatedLabels.filter(l=>!l.matched).length;
      addToast('Sesión cerrada', `${m} entregados · ${u} no entregados`);
      setSessions(p => p.map(s => s.id===session.id ? {...s,open:false,labels:toPersist} : s));
    } catch(err) {
      addToast('Error al cerrar sesión', err.message || 'Intentá de nuevo', 'alarm');
    } finally {
      setLoading(false);
    }
  };

  // ── Upload PDFs ──
  const handlePDFDrop = async (e) => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer?.files || e.target.files).filter(f=>f.type==='application/pdf');
    if (!files.length || !session?.open) return;
    setLoading(true);
    try {
      // Read scans fresh from Firestore (not the React state) to avoid a race
      // condition where this component's `scans` hasn't finished loading yet
      // and the re-sync below would silently find nothing to match against.
      let freshScans = scans;
      try {
        const snap = await db.collection('sessions').doc(session.id).get();
        freshScans = snap.data()?.scans || [];
      } catch { /* fall back to in-memory scans if this fails */ }

      let allLabels = [...labels];
      let newlyMatchedCount = 0;
      for (const f of files) {
        addToast('Procesando PDF', f.name);
        const parsed = await parseLabelsPDF(f);
        parsed.forEach(lbl => {
          if (allLabels.find(x=>x.id===lbl.id)) return; // already present, skip
          // Re-sync: if this label's id was already scanned before (e.g. label was
          // deleted and the PDF re-uploaded), restore its matched status from scans
          const priorScan = freshScans.find(s => s.scannedId === lbl.id || s.labelId === lbl.id);
          if (priorScan) {
            lbl.matched = true;
            lbl.matchedAt = priorScan.ts;
            newlyMatchedCount++;
          }
          allLabels.push(lbl);
        });
      }
      // Check heavy SKUs
      const heavyInBatch = allLabels.filter(l => heavySkus.includes(l.sku));
      if (heavyInBatch.length > 0) {
        const locs = [...new Set(heavyInBatch.map(l=>l.loc||l.cp||'?'))].join(', ');
        addToast(`⚖️ ${heavyInBatch.length} envío(s) PESADO(S)`, `Localidades: ${locs} — Pagan doble viaje`, 'alarm');
      }
      if (newlyMatchedCount > 0) {
        addToast('Escaneos restaurados', `${newlyMatchedCount} etiqueta(s) recuperaron su estado "Escaneado" según escaneos previos de esta sesión`);
      }
      setLabels(allLabels);
      // pdfCacheKey points to in-memory data only — strip it before persisting to Firestore
      const toPersist = allLabels.map(({pdfCacheKey, ...rest}) => rest);
      await db.collection('sessions').doc(session.id).update({ labels: toPersist });
      addToast('PDF cargado', `${allLabels.length} etiquetas en sesión`);
    } catch(err) {
      addToast('Error procesando PDF', err.message || 'Ocurrió un error inesperado', 'alarm');
    } finally {
      setLoading(false);
    }
  };

  // ── Scan QR ──
  const handleScan = async (raw) => {
    if (!raw.trim() || !session?.open) return;
    setScanInput('');

    // Parse scanned data
    const idMatch = raw.match(/id[Ñ\[]+(\d+)/i);
    const scannedId = idMatch?.[1] || raw.trim();

    // Try to match
    const matchIdx = labels.findIndex(l => l.id === scannedId || l.shipId === scannedId || l.packId === scannedId);

    if (matchIdx === -1) {
      // No match — alarm
      const newToast = { id: Date.now()+Math.random(), title: '🚨 Escaneo sin etiqueta', body: `ID: ${scannedId} — No está en los PDFs cargados. ¿Agregar como envío manual?`, alarm: true, scanRaw: raw, actions: [{ label: 'Sí, agregar', value: 'add_scan', variant: 'primary' }, { label: 'Ignorar', value: 'ignore', variant: 'ghost' }] };
      setToasts(p => [...p, newToast]);
      playAlarm();
    } else {
      // Match!
      const updLabels = labels.map((l,i) => i===matchIdx ? {...l, matched:true, matchedAt: new Date().toISOString()} : l);
      const newScan = { raw, scannedId, ts: new Date().toISOString(), matched: true, labelId: labels[matchIdx].id };
      const updScans = [...scans, newScan];
      setLabels(updLabels);
      setScans(updScans);
      await db.collection('sessions').doc(session.id).update({ labels: updLabels, scans: updScans });
      addToast('✅ Paquete registrado', `Envío ${scannedId} — ${labels[matchIdx].dest || labels[matchIdx].loc || ''}`);
    }
    scanRef.current?.focus();
  };

  // ── Computed ──
  const matched   = labels.filter(l => l.matched);
  const unmatched = labels.filter(l => !l.matched);
  const manualScans = scans.filter(s => s.manual);

  // ── Delete label(s) ──
  const deleteLabel = async (id) => {
    if (!db || !session) return;
    const updated = labels.filter(l => l.id !== id);
    setLabels(updated);
    await db.collection('sessions').doc(session.id).update({ labels: updated });
    addToast('Etiqueta eliminada', id);
  };

  const deleteLabels = async (ids) => {
    if (!db || !session) return;
    const idSet = new Set(ids);
    const updated = labels.filter(l => !idSet.has(l.id));
    setLabels(updated);
    await db.collection('sessions').doc(session.id).update({ labels: updated });
    addToast('Etiquetas eliminadas', `${ids.length} etiqueta(s) borradas`);
  };

  // ── Close/Delete sessions from Historial tab (any date, not just today's) ──
  const closeSessionById = async (sessionId) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).update({ open: false, closedAt: new Date().toISOString() });
      setSessions(p => p.map(s => s.id===sessionId ? {...s, open:false} : s));
      if (session?.id === sessionId) setSession(p => ({...p, open:false}));
      addToast('Sesión cerrada', 'Se actualizó el estado en el historial');
    } catch(err) {
      addToast('Error', err.message || 'No se pudo cerrar la sesión', 'alarm');
    }
  };

  const reopenSessionById = async (sessionId, dateLabel) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).update({ open: true, closedAt: null });
      setSessions(p => p.map(s => s.id===sessionId ? {...s, open:true} : s));
      if (session?.id === sessionId) setSession(p => ({...p, open:true}));
      addToast('Sesión reabierta', `Podés seguir escaneando para el ${dateLabel}`);
    } catch(err) {
      addToast('Error', err.message || 'No se pudo reabrir la sesión', 'alarm');
    }
  };

  const deleteSession = async (sessionId, dateLabel) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).delete();
      setSessions(p => p.filter(s => s.id !== sessionId));
      if (session?.id === sessionId) { setSession(null); setLabels([]); setScans([]); }
      addToast('Sesión eliminada', dateLabel || '');
    } catch(err) {
      addToast('Error', err.message || 'No se pudo eliminar la sesión', 'alarm');
    }
  };

  // ── Pending Modal ──
  const handlePending = async (action) => {
    if (!db || !pendingModal) return;
    const updates = pendingModal.items.map(l => ({...l, discarded: action==='discard'}));
    // update that session
    const snap = await db.collection('sessions').doc(pendingModal.sessionId).get();
    const existing = snap.data().labels || [];
    const merged = existing.map(l => updates.find(u=>u.id===l.id) || l);
    await db.collection('sessions').doc(pendingModal.sessionId).update({ labels: merged });
    if (action==='keep') {
      // Bring to today
      const todayUnmatched = updates.map(l=>({...l, fromDate: pendingModal.date, matched:false}));
      const mergedToday = [...labels, ...todayUnmatched.filter(l=>!labels.find(x=>x.id===l.id))];
      setLabels(mergedToday);
      if (session) await db.collection('sessions').doc(session.id).update({ labels: mergedToday });
      addToast('Etiquetas importadas', `${todayUnmatched.length} etiqueta(s) del ${pendingModal.date} agregadas a hoy`);
    }
    setPendingModal(null);
  };

  // ─────────────────────────── RENDER ───────────────────────────────────────

  // config hardcoded, no setup needed

  const tabs = [
    {id:'sesion', label:'📦 Sesión'},
    {id:'escanear', label:'📷 Escanear'},
    {id:'resumen', label:'📊 Resumen'},
    {id:'historial', label:'🗓 Historial'},
    {id:'config', label:'⚙️ Config'},
  ];

  return (
    <div className="app">
      <ToastContainer toasts={toasts} onAction={handleToastAction} onDismiss={dismissToast} />

      {/* Pending modal */}
      {pendingModal && (
        <div className="overlay">
          <div className="modal">
            <div className="modal-title">📋 Etiquetas pendientes de ayer ({pendingModal.date})</div>
            <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>
              {pendingModal.items.length} etiqueta(s) del día anterior no tuvieron escaneo. ¿Qué hacemos?
            </p>
            <div style={{maxHeight:200,overflowY:'auto',marginBottom:16}}>
              {pendingModal.items.map(l => (
                <div key={l.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  {l.thumb && <img src={l.thumb} className="label-thumb" onClick={()=>setImgModal(l)} />}
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{l.id}</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>{l.dest} · {l.loc}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-primary" onClick={()=>handlePending('keep')}>
                📥 Mantener para hoy
              </button>
              <button className="btn btn-danger" onClick={()=>handlePending('discard')}>
                🗑 Descartar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Image modal */}
      {imgModal && <LabelImageModal label={imgModal} onClose={()=>setImgModal(null)} />}
      {cameraOpen && <CameraScanner onResult={(data)=>{ handleScan(data); }} onClose={()=>setCameraOpen(false)} />}


      <header className="header">
        <div className="logo">
          <span className="logo-badge">FLEX</span>
          <span className="logo-text">Control de Entregas</span>
        </div>
        <div className="header-right">
          {session && (
            <span className={`badge ${session.open ? 'badge-green' : 'badge-red'}`}>
              {session.open ? '● Sesión abierta' : '○ Sesión cerrada'} {session.date}
            </span>
          )}

        </div>
      </header>

      <nav className="nav">
        {tabs.map(t => <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </nav>

      <main className="main">

        {/* ── SESIÓN TAB ── */}
        {tab==='sesion' && (
          <>
            <div className="section-title">Sesión del día</div>

            {!session ? (
              <div className="card" style={{textAlign:'center',padding:40}}>
                <div style={{fontSize:40,marginBottom:12}}>📦</div>
                <p style={{color:'var(--muted)',marginBottom:20}}>No hay sesión abierta para hoy</p>
                <button className="btn btn-primary" onClick={openSession} disabled={loading}>
                  {loading ? <span className="spinner"/> : null} Abrir sesión de hoy
                </button>
              </div>
            ) : (
              <>
                <div className={`session-bar ${session.open?'':'closed'}`}>
                  <div>
                    <strong>{session.date}</strong>
                    <span style={{marginLeft:12,color:'var(--muted)',fontSize:13}}>
                      {session.open ? 'Sesión activa — podés cargar PDFs y escanear' : 'Sesión cerrada'}
                    </span>
                  </div>
                  {session.open && (
                    <button className="btn btn-danger" onClick={closeSession}>Cerrar sesión</button>
                  )}
                </div>

                <div className="stats">
                  <div className="stat"><div className="stat-val">{labels.length}</div><div className="stat-label">Etiquetas cargadas</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Escaneados ✓</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{unmatched.length}</div><div className="stat-label">Sin escanear</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--blue)'}}>{manualScans.length}</div><div className="stat-label">Envíos manuales</div></div>
                </div>

                {/* Upload PDFs */}
                {session.open && (
                  <div className="card">
                    <div className="card-title">Cargar etiquetas PDF</div>
                    <div className="dropzone" onDragOver={e=>e.preventDefault()} onDrop={handlePDFDrop} onClick={()=>document.getElementById('pdfInput').click()}>
                      <div className="dropzone-icon">{loading ? '⏳' : '📄'}</div>
                      <div className="dropzone-text">{loading ? 'Procesando PDF...' : 'Arrastrá los PDF de etiquetas aquí, o hacé click'}</div>
                      <input id="pdfInput" type="file" accept=".pdf" multiple style={{display:'none'}} onChange={handlePDFDrop} />
                    </div>
                    {loading && <div className="progress-bar" style={{marginTop:8}}><div className="progress-fill" style={{width:'60%'}} /></div>}
                  </div>
                )}

                {/* Labels table */}
                {labels.length > 0 && (
                  <div className="card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                      <div className="card-title" style={{marginBottom:0}}>Etiquetas en sesión ({labels.length})</div>
                      {selectedLabels.length > 0 && (
                        <button className="btn btn-danger" style={{fontSize:12,padding:'6px 12px'}}
                          onClick={()=>{ if(confirm(`¿Borrar ${selectedLabels.length} etiqueta(s) seleccionada(s)?`)){ deleteLabels(selectedLabels); setSelectedLabels([]); } }}>
                          🗑 Borrar {selectedLabels.length} seleccionada(s)
                        </button>
                      )}
                    </div>
                    <div style={{overflowX:'auto'}}>
                      <table className="tbl">
                        <thead><tr>
                          <th style={{width:30}}>
                            <input type="checkbox" checked={selectedLabels.length===labels.length && labels.length>0}
                              onChange={e=>setSelectedLabels(e.target.checked ? labels.map(l=>l.id) : [])} />
                          </th>
                          <th>Etiqueta</th><th>Envío ID</th><th>SKU</th><th>Destinatario</th><th>Localidad</th><th>CP</th><th>Estado</th><th></th>
                        </tr></thead>
                        <tbody>
                          {labels.map(l => (
                            <tr key={l.id}>
                              <td>
                                <input type="checkbox" checked={selectedLabels.includes(l.id)}
                                  onChange={e=> setSelectedLabels(p => e.target.checked ? [...p,l.id] : p.filter(x=>x!==l.id)) } />
                              </td>
                              <td>{l.thumb && <img src={l.thumb} className="label-thumb" onClick={()=>setImgModal(l)} />}</td>
                              <td style={{fontFamily:'monospace',fontSize:12}}>{l.id}</td>
                              <td><span className="chip">{l.sku||'—'}</span>{heavySkus.includes(l.sku) && <span className="badge badge-yellow" style={{marginLeft:4}}>⚖️ Pesado</span>}</td>
                              <td style={{fontSize:12}}>{l.dest||'—'}</td>
                              <td style={{fontSize:11}}>{[l.partido, l.loc].filter(Boolean).join(' / ') || '—'}</td>
                              <td>{l.cp||'—'}</td>
                              <td>{l.matched ? <span className="badge badge-green">✓ Escaneado</span> : <span className="badge badge-yellow">Pendiente</span>}</td>
                              <td>
                                <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:13}}
                                  title="Borrar esta etiqueta"
                                  onClick={()=>{ const msg = l.matched ? `La etiqueta ${l.id} ya fue escaneada. El registro del escaneo se conserva, pero quedará sin etiqueta vinculada hasta que vuelvas a cargar el PDF. ¿Borrar igual?` : `¿Borrar la etiqueta ${l.id}?`; if(confirm(msg)) deleteLabel(l.id); }}>
                                  🗑
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ── ESCANEAR TAB ── */}
        {tab==='escanear' && (
          <>
            <div className="section-title">Escanear paquetes</div>
            {!session?.open ? (
              <div className="card empty"><div className="empty-icon">🔒</div><p>Abrí una sesión para escanear</p></div>
            ) : (
              <>
                <div className="card">
                  <div className="card-title">Apuntá la pistola lectora aquí</div>
                  <div className="scan-input-wrap">
                    <span className="scan-icon">▦</span>
                    <input
                      ref={scanRef}
                      className="input"
                      value={scanInput}
                      onChange={e=>setScanInput(e.target.value)}
                      onKeyDown={e=>{ if(e.key==='Enter') handleScan(scanInput); }}
                      placeholder="Escaneá el QR del paquete o escribí el ID..."
                      autoFocus
                    />
                  </div>
                  <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>La pistola lectora hace Enter automáticamente al terminar de leer el QR</p>
                  <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
                    <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
                    <span style={{color:'var(--muted)',fontSize:12}}>o</span>
                    <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
                  </div>
                  <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setCameraOpen(true)}>
                    📷 Escanear con la cámara
                  </button>
                </div>

                <div className="stats">
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Entregados a moto</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{unmatched.length}</div><div className="stat-label">Restantes</div></div>
                </div>

                {scans.length > 0 && (
                  <div className="card">
                    <div className="card-title">Escaneos de esta sesión ({scans.length})</div>
                    <div style={{overflowX:'auto'}}>
                      <table className="tbl">
                        <thead><tr><th>ID</th><th>Hora</th><th>Tipo</th></tr></thead>
                        <tbody>
                          {[...scans].reverse().map((s,i) => (
                            <tr key={i}>
                              <td style={{fontFamily:'monospace',fontSize:12}}>{s.scannedId || s.raw?.slice(0,30)}</td>
                              <td style={{fontSize:12,color:'var(--muted)'}}>{new Date(s.ts).toLocaleTimeString('es-AR')}</td>
                              <td>{s.manual ? <span className="badge badge-blue">Manual</span> : <span className="badge badge-green">FLEX</span>}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ── RESUMEN TAB ── */}
        {tab==='resumen' && (
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div className="section-title" style={{marginBottom:0}}>Resumen de sesión</div>
              {session && labels.length > 0 && (
                <button className="btn btn-primary" onClick={()=>generateSessionReport(session, labels, scans, zones, heavySkus)}>
                  📄 Generar informe PDF
                </button>
              )}
            </div>
            {!session ? (
              <div className="card empty"><div className="empty-icon">📊</div><p>No hay sesión activa</p></div>
            ) : (
              <>
                <div className="stats">
                  <div className="stat"><div className="stat-val">{labels.length}</div><div className="stat-label">Total etiquetas</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Entregados a moto</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--red)'}}>{unmatched.length}</div><div className="stat-label">No escaneados</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{labels.filter(l=>heavySkus.includes(l.sku)).length}</div><div className="stat-label">⚖️ Pesados</div></div>
                </div>

                {/* Zone summary — FIRST after stats */}
                {zones.length > 0 && labels.length > 0 && (
                  <div className="card">
                    <div className="card-title">Estimación de costo ({session.date})</div>
                    {(() => {
                      const cost = calcSessionCost(labels, zones, heavySkus);
                      if (cost.byZone.length === 0 && cost.unzonedCount === 0) {
                        return <p style={{color:'var(--muted)',fontSize:13}}>Todavía no hay paquetes escaneados que coincidan con una zona configurada.</p>;
                      }
                      return (
                        <div style={{overflowX:'auto'}}>
                          <table className="tbl">
                            <thead><tr><th>Zona/Localidad</th><th>Cant.</th><th>Pesados</th><th>Tarifa</th><th>Subtotal</th></tr></thead>
                            <tbody>
                              {cost.byZone.map(z => (
                                <tr key={z.name}>
                                  <td>{z.displayName||z.name}</td>
                                  <td>{z.count}</td>
                                  <td>{z.heavyCount > 0 ? <span className="badge badge-yellow">⚖️ {z.heavyCount}</span> : '—'}</td>
                                  <td>${z.price.toLocaleString('es-AR')}</td>
                                  <td style={{fontWeight:700}}>${z.subtotal.toLocaleString('es-AR')}</td>
                                </tr>
                              ))}
                              {cost.unzonedCount > 0 && (
                                <tr>
                                  <td style={{color:'var(--accent)'}} colSpan={4}>⚠️ Sin zona asignada — {cost.unzonedCount} paquete(s) ({cost.unzoned.map(l=>[l.partido,l.loc].filter(Boolean).join('/')||l.cp||l.id).join(', ')})</td>
                                  <td style={{color:'var(--muted)'}}>—</td>
                                </tr>
                              )}
                              <tr>
                                <td colSpan={4} style={{fontWeight:700,textAlign:'right'}}>
                                  Total del día ({cost.matchedCount} entregados, {cost.unzonedCount > 0 ? `${cost.matchedCount - cost.unzonedCount} con zona` : 'todos con zona'})
                                </td>
                                <td style={{fontWeight:800,color:'var(--accent)'}}>${cost.total.toLocaleString('es-AR')}</td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      );
                    })()}
                  </div>
                )}

                {/* Matched labels photos */}
                {matched.length > 0 && (
                  <div className="card">
                    <div className="card-title" style={{color:'var(--green)'}}>✅ Entregados a moto ({matched.length})</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
                      {matched.map(l => (
                        <div key={l.id} style={{background:'var(--surface2)',border:'1px solid rgba(34,197,94,.3)',borderRadius:8,padding:12,width:140}}>
                          {l.thumb && <img src={l.thumb} style={{width:'100%',borderRadius:4,marginBottom:8,cursor:'pointer'}} onClick={()=>setImgModal(l)} />}
                          <div style={{fontSize:11,fontFamily:'monospace',wordBreak:'break-all'}}>{l.id}</div>
                          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{[l.partido,l.loc].filter(Boolean).join(' / ')||l.cp||'—'}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Unmatched labels */}
                {unmatched.length > 0 && (
                  <div className="card">
                    <div className="card-title" style={{color:'var(--accent)'}}>⚠️ Sin escanear — No entregados a moto ({unmatched.length})</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
                      {unmatched.map(l => (
                        <div key={l.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:12,width:140,position:'relative'}}>
                          <button className="btn btn-ghost" style={{position:'absolute',top:6,right:6,padding:'3px 6px',fontSize:11,zIndex:1}}
                            title="Borrar esta etiqueta"
                            onClick={()=>{ const msg = l.matched ? `La etiqueta ${l.id} ya fue escaneada. El registro del escaneo se conserva, pero quedará sin etiqueta vinculada hasta que vuelvas a cargar el PDF. ¿Borrar igual?` : `¿Borrar la etiqueta ${l.id}?`; if(confirm(msg)) deleteLabel(l.id); }}>
                            🗑
                          </button>
                          {l.thumb && <img src={l.thumb} style={{width:'100%',borderRadius:4,marginBottom:8,cursor:'pointer'}} onClick={()=>setImgModal(l)} />}
                          <div style={{fontSize:11,fontFamily:'monospace',wordBreak:'break-all'}}>{l.id}</div>
                          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{[l.partido,l.loc].filter(Boolean).join(' / ')||l.cp||'—'}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ── HISTORIAL TAB ── */}
        {tab==='historial' && (
          <>
            <div className="section-title">Historial de sesiones</div>
            {sessions.length === 0 ? (
              <div className="card empty"><div className="empty-icon">🗓</div><p>No hay sesiones guardadas</p></div>
            ) : (
              <>
                <div className="card">
                  <div style={{overflowX:'auto'}}>
                    <table className="tbl">
                      <thead><tr><th>Fecha</th><th>Etiquetas</th><th>Escaneados</th><th>No escaneados</th><th>Costo</th><th>Estado</th><th>Acciones</th></tr></thead>
                      <tbody>
                        {sessions.map(s => {
                          const lbs = s.labels||[];
                          const sc = lbs.filter(l=>l.matched);
                          const un = lbs.filter(l=>!l.matched);
                          const cost = calcSessionCost(lbs, zones, heavySkus);
                          return (
                            <tr key={s.id}>
                              <td style={{fontWeight:600}}>{s.date}</td>
                              <td>{lbs.length}</td>
                              <td><span className="badge badge-green">{sc.length}</span></td>
                              <td>{un.length > 0 ? <span className="badge badge-yellow">{un.length}</span> : <span className="badge badge-green">0</span>}</td>
                              <td style={{fontWeight:600}}>{cost.total > 0 ? `$${cost.total.toLocaleString('es-AR')}` : '—'}</td>
                              <td>{s.open ? <span className="badge badge-blue">Abierta</span> : <span className="badge badge-red">Cerrada</span>}</td>
                              <td>
                                <div style={{display:'flex',gap:6}}>
                                  {s.open ? (
                                    <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12}}
                                      title="Cerrar esta sesión"
                                      onClick={()=>{ if(confirm(`¿Cerrar la sesión del ${s.date}?`)) closeSessionById(s.id); }}>
                                      🔒 Cerrar
                                    </button>
                                  ) : (
                                    <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12}}
                                      title="Reabrir esta sesión para seguir escaneando"
                                      onClick={()=>{ if(confirm(`¿Reabrir la sesión del ${s.date}? Podrás volver a escanear paquetes.`)) reopenSessionById(s.id, s.date); }}>
                                      🔓 Reabrir
                                    </button>
                                  )}
                                  <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12,color:'var(--red)'}}
                                    title="Eliminar esta sesión por completo"
                                    onClick={()=>{ if(confirm(`¿Eliminar definitivamente la sesión del ${s.date}? Esto borra sus etiquetas y escaneos guardados, no se puede deshacer.`)) deleteSession(s.id, s.date); }}>
                                    🗑
                                  </button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                <BillingRangePanel sessions={sessions} zones={zones} heavySkus={heavySkus} />
              </>
            )}
          </>
        )}

        {/* ── CONFIG TAB ── */}
        {tab==='config' && (
          <>
            <ConfigPanel db={db} heavySkus={heavySkus} setHeavySkus={setHeavySkus} zones={zones} setZones={setZones} addToast={addToast} />
          </>
        )}

      </main>
    </div>
  );
}

// ─── CONFIG PANEL ─────────────────────────────────────────────────────────────
function ConfigPanel({ db, heavySkus, setHeavySkus, zones, setZones, addToast }) {
  const [newSku, setNewSku] = useState('');
  const [newZone, setNewZone] = useState({ name:'', cp:'', price:'' });
  const [importingSkus, setImportingSkus] = useState(false);
  const [importingZones, setImportingZones] = useState(false);

  const addSku = async () => {
    if (!newSku.trim()) return;
    const updated = [...heavySkus, newSku.trim().toUpperCase()];
    setHeavySkus(updated);
    setNewSku('');
    if (db) await db.collection('config').doc('heavy_skus').set({ list: updated });
    addToast('SKU agregado', newSku.trim().toUpperCase());
  };

  const removeSku = async (sku) => {
    const updated = heavySkus.filter(s=>s!==sku);
    setHeavySkus(updated);
    if (db) await db.collection('config').doc('heavy_skus').set({ list: updated });
  };

  const addZone = async () => {
    if (!newZone.name || !newZone.price) return;
    const z = { name: newZone.name, cp: newZone.cp, price: Number(newZone.price) };
    const updated = [...zones, z];
    setZones(updated);
    setNewZone({ name:'', cp:'', price:'' });
    if (db) await db.collection('config').doc('zones').set({ list: updated });
    addToast('Zona agregada', z.name);
  };

  const removeZone = async (name) => {
    const updated = zones.filter(z=>z.name!==name);
    setZones(updated);
    if (db) await db.collection('config').doc('zones').set({ list: updated });
  };

  // Find a column value in a row object by trying several possible header name fragments
  const findCol = (row, candidates) => {
    const keys = Object.keys(row);
    for (const cand of candidates) {
      const k = keys.find(k => k.toLowerCase().trim().includes(cand));
      if (k && row[k] !== undefined && row[k] !== '') return row[k];
    }
    return null;
  };

  // ── Import heavy SKUs from Excel/CSV ──
  // Expected: a column with "sku" in its header. Any other columns are ignored.
  const importSkusFromExcel = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportingSkus(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { addToast('Archivo vacío', 'No se encontraron filas en la hoja', 'alarm'); return; }

      const found = rows
        .map(r => findCol(r, ['sku']))
        .filter(v => v !== null && String(v).trim() !== '')
        .map(v => String(v).trim().toUpperCase());

      if (!found.length) {
        addToast('No se encontró la columna SKU', 'Asegurate de tener una columna con encabezado "SKU"', 'alarm');
        return;
      }
      const merged = [...new Set([...heavySkus, ...found])];
      setHeavySkus(merged);
      if (db) await db.collection('config').doc('heavy_skus').set({ list: merged });
      addToast('SKUs importados', `${found.length} SKU(s) leídos del archivo, ${merged.length} en total`);
    } catch(err) {
      addToast('Error al leer el archivo', err.message || 'Revisá que sea un .xlsx o .csv válido', 'alarm');
    } finally {
      setImportingSkus(false);
      e.target.value = '';
    }
  };

  // ── Import zone tariffs from Excel/CSV ──
  // Expected columns (flexible headers): one with "zona"/"localidad", one with "cp"/"codigo",
  // and one with "tarifa"/"precio"/"valor"/"costo".
  const importZonesFromExcel = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportingZones(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { addToast('Archivo vacío', 'No se encontraron filas en la hoja', 'alarm'); return; }

      const parsedZones = rows.map(r => {
        const name = findCol(r, ['zona', 'localidad', 'destino', 'barrio']);
        const cp = findCol(r, ['cp', 'codigo postal', 'código postal']);
        const priceRaw = findCol(r, ['tarifa', 'precio', 'valor', 'costo']);
        const price = priceRaw !== null ? Number(String(priceRaw).replace(/[^\d.,-]/g,'').replace(',','.')) : NaN;
        if (!name || isNaN(price)) return null;
        return { name: String(name).trim(), cp: cp ? String(cp).trim() : '', price };
      }).filter(Boolean);

      if (!parsedZones.length) {
        addToast('No se pudieron leer zonas', 'Verificá que haya columnas de Zona/Localidad y Tarifa/Precio con valores numéricos', 'alarm');
        return;
      }
      // merge by name, new file overrides existing price for same zone name
      const merged = [...zones];
      parsedZones.forEach(z => {
        const idx = merged.findIndex(m => m.name.toLowerCase() === z.name.toLowerCase());
        if (idx >= 0) merged[idx] = z; else merged.push(z);
      });
      setZones(merged);
      if (db) await db.collection('config').doc('zones').set({ list: merged });
      addToast('Zonas importadas', `${parsedZones.length} zona(s) leídas del archivo, ${merged.length} en total`);
    } catch(err) {
      addToast('Error al leer el archivo', err.message || 'Revisá que sea un .xlsx o .csv válido', 'alarm');
    } finally {
      setImportingZones(false);
      e.target.value = '';
    }
  };

  return (
    <>
      <div className="section-title">Configuración</div>

      {/* Heavy SKUs */}
      <div className="card">
        <div className="card-title">⚖️ SKUs de envíos pesados (pagan doble)</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
          {heavySkus.length === 0 && <span style={{color:'var(--muted)',fontSize:13}}>No hay SKUs cargados</span>}
          {heavySkus.map(s => (
            <span key={s} className="chip" style={{cursor:'pointer'}} onClick={()=>removeSku(s)}>
              {s} <span style={{color:'var(--red)',marginLeft:4}}>✕</span>
            </span>
          ))}
        </div>
        <div className="input-row">
          <input className="input" placeholder="Ej: A158WA-1D" value={newSku} onChange={e=>setNewSku(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSku()} />
          <button className="btn btn-primary" onClick={addSku}>Agregar</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
          <span style={{color:'var(--muted)',fontSize:12}}>o</span>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
        </div>
        <label className="btn btn-ghost" style={{width:'100%',justifyContent:'center',cursor:'pointer'}}>
          {importingSkus ? <span className="spinner"/> : '📂'} Importar desde Excel/CSV
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importSkusFromExcel} disabled={importingSkus} />
        </label>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>El archivo debe tener una columna con encabezado "SKU"</p>
      </div>

      {/* Zones */}
      <div className="card">
        <div className="card-title">🗺 Tarifas por zona/localidad</div>
        {zones.length > 0 && (
          <div style={{overflowX:'auto',marginBottom:16}}>
            <table className="tbl">
              <thead><tr><th>Zona/Localidad</th><th>CP</th><th>Tarifa ($)</th><th></th></tr></thead>
              <tbody>
                {zones.map(z => (
                  <tr key={z.name}>
                    <td>{z.name}</td>
                    <td>{z.cp||'—'}</td>
                    <td>${z.price.toLocaleString('es-AR')}</td>
                    <td><button className="btn btn-ghost" style={{padding:'4px 8px',fontSize:12}} onClick={()=>removeZone(z.name)}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px 120px auto',gap:8,alignItems:'center'}}>
          <input className="input" placeholder="Localidad" value={newZone.name} onChange={e=>setNewZone(p=>({...p,name:e.target.value}))} />
          <input className="input" placeholder="CP" value={newZone.cp} onChange={e=>setNewZone(p=>({...p,cp:e.target.value}))} />
          <input className="input" placeholder="$ tarifa" type="number" value={newZone.price} onChange={e=>setNewZone(p=>({...p,price:e.target.value}))} />
          <button className="btn btn-primary" onClick={addZone}>Agregar</button>
        </div>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:10}}>Los envíos pesados se calculan como tarifa × 2</p>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
          <span style={{color:'var(--muted)',fontSize:12}}>o</span>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
        </div>
        <label className="btn btn-ghost" style={{width:'100%',justifyContent:'center',cursor:'pointer'}}>
          {importingZones ? <span className="spinner"/> : '📂'} Importar desde Excel/CSV
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importZonesFromExcel} disabled={importingZones} />
        </label>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>Columnas esperadas: Zona/Localidad, CP (opcional), Tarifa/Precio. Si una zona ya existe, se actualiza su tarifa.</p>
      </div>

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
