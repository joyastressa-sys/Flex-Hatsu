// в”Ђв”Ђв”Ђ AUDIO ALARM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const times = [0, 0.3, 0.6];
    times.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.25);
    });
  } catch(e) {}
}

// в”Ђв”Ђв”Ђ COST CALCULATION (shared between Resumen, Historial, and date-range billing) в”Ђв”Ђ
// Returns { byZone: [{name, cp, count, heavyCount, price, subtotal}], total, matchedCount, unmatchedCount }
// Normalize a string for fuzzy comparison: lowercase, remove dots/accents/extra spaces
function normLocText(s) {
  return (s||'').toLowerCase()
    .replace(/\./g,'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ').trim();
}

// Given a label, find the SINGLE best matching zone.
// Priority: 1) exact CP match, 2) normalized text contains zone name as whole word, 3) null
// This is THE single source of truth for zone matching вЂ” used by calcSessionCost,
// the Resumen tab, and the Excel/PDF billing exports, so results are always consistent.
function findZoneForLabel(label, zones) {
  const lcp = (label.cp||'').trim();
  const locText = [label.partido, label.loc].filter(Boolean).join(' ');
  const lLoc = normLocText(locText);

  // 1) CP exact match
  if (lcp) {
    const byCP = zones.filter(z => z.cp && z.cp.trim() === lcp);
    if (byCP.length === 1) return byCP[0];
    if (byCP.length > 1) {
      const locMatch = byCP.find(z => {
        const zn = normLocText(z.name);
        return lLoc === zn || new RegExp('(^|\\s)' + zn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(\\s|$)').test(lLoc);
      });
      if (locMatch) return locMatch;
      return byCP[0];
    }
  }

  // 2) Text match: zone name is fully contained in label's partido+loc (word boundary)
  const textCandidates = [...zones]
    .sort((a,b) => b.name.length - a.name.length)
    .filter(z => {
      const zn = normLocText(z.name);
      return lLoc === zn || new RegExp('(^|\\s)' + zn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(\\s|$)').test(lLoc);
    });
  if (textCandidates.length > 0) return textCandidates[0];

  return null;
}

function calcSessionCost(sessionLabels, zones, heavySkus) {
  const matched = (sessionLabels || []).filter(l => l.matched);

  // Assign each matched label to exactly one zone, using the shared findZoneForLabel logic
  const zoneMap = {}; // zoneName -> { zone, labels[] }
  const unzoned = [];

  matched.forEach(l => {
    const z = findZoneForLabel(l, zones);
    if (z) {
      if (!zoneMap[z.name]) zoneMap[z.name] = { zone: z, labels: [] };
      zoneMap[z.name].labels.push(l);
      // Track each unique label locality for display (show what the label says, not the zone name)
      if (!zoneMap[z.name].labelLocs) zoneMap[z.name].labelLocs = {};
      const lDisplay = [l.partido, l.loc].filter(Boolean).join(' / ') || l.cp || z.name;
      zoneMap[z.name].labelLocs[lDisplay] = (zoneMap[z.name].labelLocs[lDisplay]||0) + 1;
    } else {
      unzoned.push(l);
    }
  });

  const byZone = Object.values(zoneMap).map(({ zone, labels }) => {
    const heavyCount = labels.filter(l => heavySkus.includes(l.sku)).length;
    const subtotal = labels.length * zone.price + heavyCount * zone.price;
    // Build display: if all labels have same locality, show that; otherwise show "Zone (n localities)"
    const locs = Object.entries(zoneMap[zone.name]?.labelLocs || {});
    const displayName = locs.length === 1 ? locs[0][0] : locs.length === 0 ? zone.name : zone.name + ' (' + locs.map(([k,v])=>k+(v>1?' x'+v:'')).join(', ') + ')';
    return { name: zone.name, displayName, cp: zone.cp, count: labels.length, heavyCount, price: zone.price, subtotal };
  }).sort((a,b) => b.subtotal - a.subtotal);

  const total = byZone.reduce((sum, z) => sum + z.subtotal, 0);

  return {
    byZone,
    total,
    matchedCount: matched.length,
    unmatchedCount: (sessionLabels || []).filter(l => !l.matched).length,
    unzonedCount: unzoned.length,
    unzoned,
  };
}

// в”Ђв”Ђв”Ђ LOCAL FOLDER UTILITIES (File System Access API вЂ” Chrome/Edge only) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const isFileSystemAccessSupported = () => typeof window !== 'undefined' && 'showDirectoryPicker' in window;

async function getOrCreateSubfolder(parentHandle, name) {
  try {
    return await parentHandle.getDirectoryHandle(name, { create: true });
  } catch { return null; }
}

async function saveFileToFolder(folderHandle, subfolderName, fileName, content, mimeType = 'application/octet-stream') {
  if (!folderHandle) return false;
  try {
    const subfolder = subfolderName ? await getOrCreateSubfolder(folderHandle, subfolderName) : folderHandle;
    if (!subfolder) return false;
    const fileHandle = await subfolder.getFileHandle(fileName, { create: true });
    const writable = await fileHandle.createWritable();
    if (typeof content === 'string') {
      await writable.write(new Blob([content], { type: mimeType }));
    } else {
      await writable.write(content); // Blob or ArrayBuffer
    }
    await writable.close();
    return true;
  } catch (err) {
    console.warn('Could not save to local folder:', err);
    return false;
  }
}

        ${l.matchedAt ? `<div class="label-meta" style="color:#22c55e">вњ“ Escaneado ${new Date(l.matchedAt).toLocaleTimeString('es-AR')}</div>` : ''}
      </div>
    </div>`;

    </tr>`).join('');

  const html = `<!DOCTYPE html>

// в”Ђв”Ђв”Ђ PDF PARSER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const pdfBufferCache = {}; // fileName -> ArrayBuffer (in-memory, this browser session only)

async function parseLabelsPDF(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buf = await file.arrayBuffer();
  // Keep a copy in memory so we can re-render any page in HD instantly, no upload needed
  const cacheKey = `${file.name}_${file.size}`;
  pdfBufferCache[cacheKey] = buf.slice(0); // slice(0) clones, since pdf.js consumes the buffer

  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const labels = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    const text = tc.items.map(it => it.str).join(' ');

    // Extract fields вЂ” Mercado Libre FLEX format
    const shipId = (text.match(/Envio[:\s]+(\d[\d\s]{6,12}\d)/i) || [])[1]?.replace(/\s/g,'') || null;
    const packId = (text.match(/Pack ID[:\s]*([\d]+)/i) || [])[1] || null;
    const ventaId = (text.match(/Venta[:\s]+([\d\s]{10,})/i) || [])[1]?.replace(/\s/g,'') || null;

    // Agency / external label format (GURA-FLEX style):
    //   Partido at start, Destinatario as name, phone, address CP:XXXX, ObservaciГіn=SKU, Envio: N (any length)
    // Key identifiers: has "Rte.:" and short "Envio: N" (no Pack ID, no long shipment number)
    const isAgencyLabel = !shipId && !packId && !ventaId && /\bRte[.:\s]/i.test(text) && /\bEnvio[:\s]*\d+/i.test(text);
    const envioExterno = isAgencyLabel ? (text.match(/Envio[:\s]*(\d+)/i) || [])[1] || null : null;

    let sku    = (text.match(/SKU[:\s:]*([A-Z0-9\-\/\+]+)/i) || [])[1] || null;
    // Agency labels use "ObservaciГіn:" for the product/SKU reference
    if (!sku && isAgencyLabel) sku = (text.match(/Observaci[oГі]n[:\s]+([^\s]{1,30})/i) || [])[1]?.trim() || null;

    let dest   = (text.match(/Destinatario[:\s]*([^\n(]+)/i) || [])[1]?.trim() || null;
    // Agency (GURA): text structure is PARTIDO\nDESTINATARIO\nTELEFONO\n...
    // The destinatario is the first ALL-CAPS multi-word name after the partido line
    if (!dest && isAgencyLabel) {
      // Split by newlines (pdf.js joins with spaces, so we look for pattern after partido)
      const lines = text.split(/\s{2,}/);
      // lines[0] = partido (AVELLANEDA), lines[1] = name (BENITO CAMELAS)
      if (lines.length >= 2) dest = lines[1]?.trim() || null;
    }

    const dateM  = (text.match(/(\d{1,2}\s+(?:JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC|ENE|FEB|MAR|ABR|MAY|JUN|JUL|AGO|SEP|OCT|NOV|DIC))/i) || [])[1]
      || (text.match(/(\d{1,2}\/\d{1,2}\/\d{4})/i) || [])[1] || null;
    const seller = isAgencyLabel
      ? (text.match(/Rte[.:\s]+([A-ZГЃГ‰ГЌГ“ГљA-Za-z\s]+)/i) || [])[1]?.trim() || null
      : (text.match(/^([A-ZГЃГ‰ГЌГ“Гљ\s]+)\s+#\d/m) || [])[1]?.trim() || null;

    // Extract destination CP and locality
    let cp = null;
    let loc = null;
    let partido = null;
    let tipoEnvio = null;

    if (isAgencyLabel) {
      // Agency format: partido is in the top-left header, CP in address line "Av. Mitre 1500 CP: 1870"
      const agencyCp = (text.match(/\bCP[:\s]*(\d{4,5})/i) || [])[1] || null;
      cp = agencyCp;
      // Partido is the first segment before double space/newline in GURA labels
      const partidoMatch = text.match(/^([A-ZГЃГ‰ГЌГ“ГљГњГ‘\s]{3,30?})\s{2,}/);
      partido = partidoMatch?.[1]?.trim() || null;
      loc = partido; // for agency labels, partido = locality (no sub-barrio distinction)
      tipoEnvio = null; // agency labels don't have RESIDENCIAL/COMERCIAL
    } else {
      // FLEX format: extract from CP: XXXX PARTIDO LOCALIDAD RESIDENCIAL/COMERCIAL block
      const destBlock = text.match(/\bCP:\s*(\d{4,5})\s+([A-ZГЃГ‰ГЌГ“ГљГњГ‘][A-ZГЃГ‰ГЌГ“ГљГњГ‘\s\-]{2,35?}?)\s+([A-ZГЃГ‰ГЌГ“ГљГњГ‘][A-ZГЃГ‰ГЌГ“ГљГњГ‘\s\-]{2,35?}?)\s+(RESIDENCIAL|COMERCIAL)/i);
      if (destBlock) {
        cp      = destBlock[1]?.trim() || null;
        partido = destBlock[2]?.trim().replace(/\s+/g,' ') || null;
        loc     = destBlock[3]?.trim().replace(/\s+/g,' ') || null;
        tipoEnvio = destBlock[4]?.toUpperCase() || null;
      } else {
        const cpOnly = text.match(/\bCP:\s*(\d{4,5})/i);
        if (cpOnly) cp = cpOnly[1].trim();
      }
    }

    // Render SMALL thumbnail only (lightweight, for the list view + Firestore storage)
    const viewport = page.getViewport({ scale: 0.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    const thumb = canvas.toDataURL('image/jpeg', 0.75);

    const labelId = shipId || packId || ventaId || envioExterno;
    if (labelId) {
      labels.push({
        id: labelId, shipId, packId, ventaId, envioExterno,
        sku, cp, partido, dest, loc, tipoEnvio,
        dateLabel: dateM, seller, thumb, page: i,
        matched: false, text, pdfCacheKey: cacheKey, hdThumb: null,
        source: isAgencyLabel ? 'AGENCIA' : 'FLEX'
      });
    }
  }
  return labels;
}

// в”Ђв”Ђв”Ђ HIGH-RES PAGE RENDER (on-demand, from in-memory PDF buffer вЂ” no upload/cloud needed) в”Ђв”Ђ
async function renderHighResPage(cacheKey, pageNum) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buf = pdfBufferCache[cacheKey];
  if (!buf) throw new Error('PDF no disponible en memoria вЂ” recargГЎ el PDF para ver en alta resoluciГіn');

  const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
  const page = await pdf.getPage(pageNum);
  const viewport = page.getViewport({ scale: 3 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return canvas.toDataURL('image/jpeg', 0.92);
}

// в”Ђв”Ђв”Ђ LABEL IMAGE MODAL (HD render from in-memory PDF, or saved hdThumb fallback) в”Ђв”Ђ
function LabelImageModal({ label, onClose }) {
  const [hdSrc, setHdSrc] = useState(label.hdThumb || null);
  const [loadingHd, setLoadingHd] = useState(false);
  const [hdError, setHdError] = useState(false);

  useEffect(() => {
    let cancelled = false;
    if (!label.hdThumb && label.pdfCacheKey && label.page) {
      setLoadingHd(true);
      setHdError(false);
      renderHighResPage(label.pdfCacheKey, label.page).then(src => {
        if (!cancelled) { setHdSrc(src); setLoadingHd(false); }
      }).catch(() => {
        if (!cancelled) { setHdError(true); setLoadingHd(false); }
      });
    }
    return () => { cancelled = true; };
  }, [label.pdfCacheKey, label.page, label.hdThumb]);

  const displaySrc = hdSrc || label.thumb;
  const statusMsg = label.hdThumb ? 'вњ“ Alta resoluciГіn (guardada)'
    : loadingHd ? 'вЏі Generando alta resoluciГіn desde el PDF...'
    : hdSrc ? 'вњ“ Alta resoluciГіn'
    : hdError ? 'вљ пёЏ El PDF original ya no estГЎ en memoria вЂ” recargalo para ver en HD'
    : '';

  return (
    <div className="overlay" onClick={onClose} style={{padding:16,paddingTop:60,alignItems:'flex-start'}}>
      <div style={{position:'relative',width:'min(94vw, 480px)',maxHeight:'88vh',display:'flex',flexDirection:'column',alignItems:'center',margin:'0 auto'}} onClick={e=>e.stopPropagation()}>
        <button className="btn btn-ghost" onClick={onClose} style={{position:'absolute',top:-44,right:0}}>вњ• Cerrar</button>
        {statusMsg && (
          <div style={{position:'absolute',top:-44,left:0,fontSize:12,color:'var(--muted)',lineHeight:'36px',maxWidth:'60%'}}>{statusMsg}</div>
        )}
        <div style={{width:'100%',maxHeight:'80vh',overflowY:'auto',borderRadius:8,border:'2px solid var(--border)',background:'#fff'}}>

          <div style={{marginTop:12,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 16px',fontSize:13,color:'var(--muted)',textAlign:'center',maxWidth:'96vw'}}>

  );
}

// в”Ђв”Ђв”Ђ CAMERA QR SCANNER (for mobile, no gun scanner available) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function CameraScanner({ onResult, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const [error, setError] = useState(null);
  const [status, setStatus] = useState('Iniciando cГЎmara...');
  const [lastScanned, setLastScanned] = useState(null); // { text, ts } for feedback
  const lastResultRef = useRef({ text: null, ts: 0 });

  useEffect(() => {
    let active = true;

    async function start() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        if (!active) { stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play();
        }
        setStatus('ApuntГЎ al cГіdigo QR');
        tick();
      } catch (err) {
        setError(err.name === 'NotAllowedError'
          ? 'Permiso de cГЎmara denegado. Habilitalo en la configuraciГіn del navegador.'
          : 'No se pudo acceder a la cГЎmara: ' + err.message);
      }
    }

    function tick() {
      if (!active) return;
      const video = videoRef.current;
      const canvas = canvasRef.current;
      if (video && canvas && video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          const now = Date.now();
          // Debounce: 3s after any scan to avoid reading same QR repeatedly
          if (code.data !== lastResultRef.current.text || now - lastResultRef.current.ts > 3000) {
            lastResultRef.current = { text: code.data, ts: now };
            setLastScanned({ text: code.data, ts: now });
            onResult(code.data);
          }
        }
      }
      rafRef.current = requestAnimationFrame(tick);
    }

    start();
    return () => {
      active = false;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  // Clear feedback after 2.5s
  useEffect(() => {
    if (!lastScanned) return;
    const t = setTimeout(() => setLastScanned(null), 2500);
    return () => clearTimeout(t);
  }, [lastScanned]);

  return (
    <div className="overlay" onClick={onClose} style={{padding:16}}>
      <div style={{position:'relative',width:'min(94vw, 480px)',display:'flex',flexDirection:'column',alignItems:'center'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',marginBottom:8}}>
          <span style={{fontSize:13,color:error?'var(--red)':'var(--muted)'}}>{error || status}</span>
          <button className="btn btn-ghost" onClick={onClose}>вњ• Cerrar</button>
        </div>
        <div style={{width:'100%',aspectRatio:'1',borderRadius:8,overflow:'hidden',border:`2px solid ${lastScanned ? 'var(--green)' : 'var(--border)'}`,position:'relative',background:'#000',transition:'border-color .3s'}}>
          <video ref={videoRef} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover'}} />
          <div style={{position:'absolute',inset:'15%',border:`3px solid ${lastScanned ? 'var(--green)' : 'var(--accent)'}`,borderRadius:12,opacity:.8,pointerEvents:'none',transition:'border-color .3s'}} />
          {lastScanned && (
            <div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(34,197,94,.9)',color:'#000',padding:'10px 14px',fontSize:13,fontWeight:700,textAlign:'center'}}>
              вњ“ Escaneado
            </div>
          )}
        </div>
        <canvas ref={canvasRef} style={{display:'none'}} />
        <p style={{color:'var(--muted)',fontSize:12,marginTop:10,textAlign:'center'}}>
          La cГЎmara queda abierta вЂ” escaneГЎ un paquete tras otro sin cerrar este modal
        </p>
      </div>
    </div>
  );
}

// в”Ђв”Ђв”Ђ BILLING RANGE PANEL (date-range cost summary, for paying the courier) в”Ђв”Ђв”Ђ
function BillingRangePanel({ sessions, zones, heavySkus, folderHandleRef }) {
  const [from, setFrom] = useState('');
  const [to, setTo] = useState('');

  const inRange = sessions.filter(s => {
    if (from && s.date < from) return false;
    if (to && s.date > to) return false;
    return true;
  });

  const perSession = inRange.map(s => ({ date: s.date, cost: calcSessionCost(s.labels||[], zones, heavySkus) }));
  const grandTotal = perSession.reduce((sum, s) => sum + s.cost.total, 0);

  // Aggregate by zone across the whole range
  const zoneTotals = {};
  perSession.forEach(s => {
    s.cost.byZone.forEach(z => {
      if (!zoneTotals[z.name]) zoneTotals[z.name] = { name: z.name, count: 0, heavyCount: 0, subtotal: 0, price: z.price };
      zoneTotals[z.name].count += z.count;
      zoneTotals[z.name].heavyCount += z.heavyCount;
      zoneTotals[z.name].subtotal += z.subtotal;
    });
  });
  const zoneTotalsList = Object.values(zoneTotals).sort((a,b)=>b.subtotal-a.subtotal);

  const setQuickRange = (days) => {
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - (days - 1));
    setTo(end.toISOString().slice(0,10));
    setFrom(start.toISOString().slice(0,10));
  };

  // в”Ђв”Ђ Build the full per-package detail rows for the whole range (for Excel export) в”Ђв”Ђ
  const buildDetailRows = () => {
    const rows = [];
    inRange.forEach(s => {
      const sessionLabels = s.labels || [];
      const matchedLabels = sessionLabels.filter(l => l.matched);
      matchedLabels.forEach(l => {
        // Use the same single source of truth as calcSessionCost for zone matching
        const zoneEntry = findZoneForLabel(l, zones);
        const isHeavy = heavySkus.includes(l.sku);
        rows.push({
          'Fecha': s.date,
          'EnvГ­o ID': l.id,
          'Destinatario': l.dest || '',
          'CP': l.cp || '',
          'Partido': l.partido || '',
          'Localidad': l.loc || '',
          'Tipo': l.tipoEnvio || '',
          'SKU': l.sku || '',
          'Pesado': isHeavy ? 'SГЌ' : 'NO',
          'Zona configurada': zoneEntry?.name || 'Sin zona',
          'Tarifa': zoneEntry?.price || 0,
          'Costo del envГ­o': zoneEntry ? (zoneEntry.price * (isHeavy ? 2 : 1)) : 0,
        });
      });
    });
    return rows;
  };

  const exportToExcel = () => {
    const rows = buildDetailRows();
    if (!rows.length) { alert('No hay paquetes entregados en este rango para exportar.'); return; }

    const wb = window.XLSX.utils.book_new();

    // Sheet 1: full detail
    const ws1 = window.XLSX.utils.json_to_sheet(rows);
    window.XLSX.utils.book_append_sheet(wb, ws1, 'Detalle de envГ­os');

    // Sheet 2: summary by zone
    const summaryRows = zoneTotalsList.map(z => ({
      'Zona/Localidad': z.name,
      'Cantidad': z.count,
      'Pesados': z.heavyCount,
      'Tarifa': z.price,
      'Subtotal': z.subtotal,
    }));
    summaryRows.push({ 'Zona/Localidad': 'TOTAL', 'Cantidad': perSession.reduce((s,x)=>s+x.cost.matchedCount,0), 'Pesados': '', 'Tarifa': '', 'Subtotal': grandTotal });
    const ws2 = window.XLSX.utils.json_to_sheet(summaryRows);
    window.XLSX.utils.book_append_sheet(wb, ws2, 'Resumen por zona');

    // Sheet 3: summary by day
    const dayRows = perSession.map(s => ({ 'Fecha': s.date, 'Entregados': s.cost.matchedCount, 'Costo del dГ­a': s.cost.total }));
    const ws3 = window.XLSX.utils.json_to_sheet(dayRows);
    window.XLSX.utils.book_append_sheet(wb, ws3, 'Resumen por dГ­a');

    const fname = `Liquidacion_FLEX_${from||'inicio'}_a_${to||'hoy'}.xlsx`;
    window.XLSX.writeFile(wb, fname);

    // Save a copy to local folder if configured
    if (folderHandleRef?.current) {
      const xlsxBuf = window.XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      saveFileToFolder(folderHandleRef.current, 'Informes', fname, new Blob([xlsxBuf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
    }
  };

  const exportToPDF = () => {
    const rows = buildDetailRows();
    const now = new Date().toLocaleString('es-AR');

    <div class="stat"><div class="stat-val" style="color:#b45309">$${grandTotal.toLocaleString('es-AR')}</div><div class="stat-label">Total a liquidar</div></div>
  </div>
  <h2>Resumen por zona</h2>
  <table>
    <thead><tr><th>Zona/Localidad</th><th>Cant.</th><th>Pesados</th><th>Tarifa</th><th>Subtotal</th></tr></thead>
