function App() {
  const [firebaseCfg, setFirebaseCfg] = useState(getStoredConfig);
  const [db, setDb] = useState(null);
  const [storage, setStorage] = useState(null);
  const folderHandleRef = useRef(null); // File System Access API handle for local folder
  const [folderName, setFolderName] = useState('');
  const [tab, setTab] = useState('sesion');
  const [toasts, setToasts] = useState([]);

  // App state
  const [session, setSession] = useState(null);       // active session doc
  const [labels, setLabels] = useState([]);            // labels from PDFs
  const [scans, setScans] = useState([]);              // scans this session
  const [heavySkus, setHeavySkus] = useState([]);      // heavy SKU list
  const [zones, setZones] = useState([]);              // zone tariff table
  const [loading, setLoading] = useState(false);
  const [scanInput, setScanInput] = useState('');
  const [pendingModal, setPendingModal] = useState(null);
  const [imgModal, setImgModal] = useState(null);
  const [selectedLabels, setSelectedLabels] = useState([]);
  const [cameraOpen, setCameraOpen] = useState(false);
  const [agencyMatchModal, setAgencyMatchModal] = useState(null); // { raw, scannedId, candidates[] }
  const [sessions, setSessions] = useState([]);        // past sessions
  const scanRef = useRef(null);
  const scansRef = useRef(scans);
  const labelsRef = useRef(labels);
  useEffect(() => { scansRef.current = scans; }, [scans]);
  useEffect(() => { labelsRef.current = labels; }, [labels]);

  // в”Ђв”Ђ Init Firebase в”Ђв”Ђ
  useEffect(() => {
    if (!firebaseCfg) return;
    try {
      let app;
      if (window.firebase.apps.length) app = window.firebase.app();
      else app = window.firebase.initializeApp(firebaseCfg);
      setDb(window.firebase.firestore(app));
      setStorage(window.firebase.storage(app));
    } catch(e) { addToast('Error Firebase','VerificГЎ la configuraciГіn','error'); }
  }, [firebaseCfg]);

  // в”Ђв”Ђ Load data from Firestore в”Ђв”Ђ
  useEffect(() => {
    if (!db) return;
    // today's session
    const today = new Date().toISOString().slice(0,10);
    db.collection('sessions').where('date','==',today).limit(1).get().then(snap => {
      if (!snap.empty) {
        const d = snap.docs[0];
        const s = { id: d.id, ...d.data() };
        setSession(s);
        setLabels(s.labels || []);
        setScans(s.scans || []);
      }
    });
    // config
    db.collection('config').doc('heavy_skus').get().then(d => { if(d.exists) setHeavySkus(d.data().list||[]); });
    db.collection('config').doc('zones').get().then(d => { if(d.exists) setZones(d.data().list||[]); });
    // past sessions
    db.collection('sessions').orderBy('date','desc').limit(30).get().then(snap => {
      setSessions(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, [db]);

  // в”Ђв”Ђ Check yesterday's unmatched on load в”Ђв”Ђ
  useEffect(() => {
    if (!db || !session) return;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toISOString().slice(0,10);
    db.collection('sessions').where('date','==',yStr).limit(1).get().then(snap => {
      if (snap.empty) return;
      const d = snap.docs[0].data();
      const unmatched = (d.labels||[]).filter(l => !l.matched && !l.discarded);
      if (unmatched.length > 0) {
        setPendingModal({ sessionId: snap.docs[0].id, date: yStr, items: unmatched });
      }
    });
  }, [db, session?.id]);

  // в”Ђв”Ђ Toast helpers в”Ђв”Ђ
  const addToast = useCallback((title, body, type='info', actions=null) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, title, body, alarm: type==='alarm', actions }]);
    if (type === 'alarm') playAlarm();
    if (!actions) setTimeout(() => setToasts(p => p.filter(t=>t.id!==id)), 5000);
  }, []);

  const handleToastAction = useCallback((toastId, value) => {
    // value = 'add_scan' or 'ignore'
    if (value === 'add_scan' && db && session) {
      const raw = toasts.find(t=>t.id===toastId)?.scanRaw;
      if (!raw) return;
      const newScan = { raw, ts: new Date().toISOString(), matched: false, manual: true };
      const updated = [...scans, newScan];
      setScans(updated);
      db.collection('sessions').doc(session.id).update({ scans: updated });
    }
  }, [db, session, scans, toasts]);

  const dismissToast = id => setToasts(p => p.filter(t=>t.id!==id));

  // в”Ђв”Ђ Open Session в”Ђв”Ђ
  const openSession = async () => {
    if (!db) return;
    const today = new Date().toISOString().slice(0,10);
    setLoading(true);
    const existing = await db.collection('sessions').where('date','==',today).limit(1).get();
    if (!existing.empty) {
      const d = existing.docs[0];
      const s = { id: d.id, ...d.data() };
      setSession(s); setLabels(s.labels||[]); setScans(s.scans||[]);
    } else {
      const ref = await db.collection('sessions').add({ date: today, open: true, labels: [], scans: [], createdAt: new Date().toISOString() });
      const s = { id: ref.id, date: today, open: true, labels: [], scans: [] };
      setSession(s); setLabels([]); setScans([]);
    }
    setLoading(false);
  };

  // в”Ђв”Ђ Close Session в”Ђв”Ђ
  const closeSession = async () => {
    if (!db || !session) return;
    setLoading(true);
    try {
      // Generate HD snapshots for unmatched labels while their PDF is still in memory,
      // so they can be viewed clearly later even after the page reloads.
      const stillUnmatched = labels.filter(l => !l.matched);
      const updatedLabels = await Promise.all(labels.map(async (l) => {
        if (l.matched || l.hdThumb || !l.pdfCacheKey) return l;
        try {
          const hd = await renderHighResPage(l.pdfCacheKey, l.page);
          return { ...l, hdThumb: hd };
        } catch {
          return l; // PDF no longer in memory, keep as-is
        }
      }));
      const toPersist = updatedLabels.map(({pdfCacheKey, text, thumb, hdThumb, ...rest}) => rest);
      await db.collection('sessions').doc(session.id).update({ labels: toPersist, open: false, closedAt: new Date().toISOString() });
      setLabels(updatedLabels);
      setSession(p => ({...p, open: false}));
      const m = updatedLabels.filter(l=>l.matched).length;
      const u = updatedLabels.filter(l=>!l.matched).length;
      addToast('SesiГіn cerrada', `${m} entregados В· ${u} no entregados`);
      setSessions(p => p.map(s => s.id===session.id ? {...s,open:false,labels:toPersist} : s));
    } catch(err) {
      addToast('Error al cerrar sesiГіn', err.message || 'IntentГЎ de nuevo', 'alarm');
    } finally {
      setLoading(false);
    }
  };

  // в”Ђв”Ђ Local folder selector в”Ђв”Ђ
  const selectLocalFolder = async () => {
    if (!isFileSystemAccessSupported()) {
      addToast('No disponible', 'La selecciГіn de carpeta local solo funciona en Chrome o Edge en PC', 'alarm');
      return;
    }
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      folderHandleRef.current = handle;
      setFolderName(handle.name);
      addToast('вњ… Carpeta local configurada', `Los PDFs e informes se guardarГЎn en "${handle.name}"`);
    } catch (err) {
      if (err.name !== 'AbortError') addToast('Error', err.message, 'alarm');
    }
  };

  // в”Ђв”Ђ Upload PDFs в”Ђв”Ђ
  const handlePDFDrop = async (e) => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer?.files || e.target.files).filter(f=>f.type==='application/pdf');
    if (!files.length || !session?.open) return;
    setLoading(true);
    try {
      // Read scans fresh from Firestore (not the React state) to avoid a race
      // condition where this component's `scans` hasn't finished loading yet
      // and the re-sync below would silently find nothing to match against.
      let freshScans = scans;
      try {
        const snap = await db.collection('sessions').doc(session.id).get();
        freshScans = snap.data()?.scans || [];
      } catch { /* fall back to in-memory scans if this fails */ }

      let allLabels = [...labels];
      let newlyMatchedCount = 0;
      for (const f of files) {
        addToast('Procesando PDF', f.name);
        // Save a copy to local folder if one is configured
        if (folderHandleRef.current) {
          const subFolder = `PDFs/${session.date}`;
          const buf = await f.arrayBuffer();
          await saveFileToFolder(folderHandleRef.current, subFolder, f.name, new Blob([buf], {type:'application/pdf'}));
        }
        const parsed = await parseLabelsPDF(f);
        parsed.forEach(lbl => {
          if (allLabels.find(x=>x.id===lbl.id)) return; // already present, skip
          // Re-sync: if this label's id was already scanned before (e.g. label was
          // deleted and the PDF re-uploaded), restore its matched status from scans
          const priorScan = freshScans.find(s => s.scannedId === lbl.id || s.labelId === lbl.id);
          if (priorScan) {
            lbl.matched = true;
            lbl.matchedAt = priorScan.ts;
            newlyMatchedCount++;
          }
          allLabels.push(lbl);
        });
      }
      // Check heavy SKUs
      const heavyInBatch = allLabels.filter(l => heavySkus.includes(l.sku));
      if (heavyInBatch.length > 0) {
        const locs = [...new Set(heavyInBatch.map(l=>l.loc||l.cp||'?'))].join(', ');
        addToast(`вљ–пёЏ ${heavyInBatch.length} envГ­o(s) PESADO(S)`, `Localidades: ${locs} вЂ” Pagan doble viaje`, 'alarm');
      }
      if (newlyMatchedCount > 0) {
        addToast('Escaneos restaurados', `${newlyMatchedCount} etiqueta(s) recuperaron su estado "Escaneado" segГєn escaneos previos de esta sesiГіn`);
      }
      setLabels(allLabels);
      // pdfCacheKey points to in-memory data only вЂ” strip it before persisting to Firestore
      const toPersist = allLabels.map(({pdfCacheKey, text, thumb, hdThumb, ...rest}) => rest);
      await db.collection('sessions').doc(session.id).update({ labels: toPersist });
      addToast('PDF cargado', `${allLabels.length} etiquetas en sesiГіn`);
    } catch(err) {
      addToast('Error procesando PDF', err.message || 'OcurriГі un error inesperado', 'alarm');
    } finally {
      setLoading(false);
    }
  };

  // в”Ђв”Ђ Scan QR в”Ђв”Ђ
  const handleScan = async (raw) => {
    if (!raw.trim() || !session?.open) return;
    setScanInput('');

    // в”Ђв”Ђ Parse scanned QR вЂ” support multiple formats в”Ђв”Ђ
    // Format 1a (ML FLEX via gun scanner):  id[Г‘[47299295741[,...
    // Format 1b (ML FLEX via camera/jsQR):  {"id":"47299295741","sender_id":...}
    // Format 2  (GURA/agency):              local[Г± 1, [did[Г± [132012[,...
    let scannedId = raw.trim();
    let scanSource = 'FLEX';

    // Try JSON format first (camera scan of ML QR)
    let jsonQr = null;
    try {
      const cleaned = raw.trim().replace(/^[^{]*/, '').replace(/[^}]*$/, '');
      if (cleaned.startsWith('{')) jsonQr = JSON.parse(cleaned);
    } catch {}

    const mlMatch = raw.match(/\bid[Г‘\[]+(\d+)/i);
    const agencyDidMatch = raw.match(/\bdid[Г‘\[\s]+(\d+)/i);
    const agencyEnvioMatch = raw.match(/envio[Г‘\[\s]*(\d+)/i);

    if (jsonQr?.id) {
      scannedId = String(jsonQr.id);
      scanSource = 'FLEX';
    } else if (mlMatch) {
      scannedId = mlMatch[1];
      scanSource = 'FLEX';
    } else if (agencyDidMatch) {
      scannedId = agencyDidMatch[1];
      scanSource = 'AGENCIA';
    } else if (agencyEnvioMatch) {
      scannedId = agencyEnvioMatch[1];
      scanSource = 'AGENCIA';
    }

    // Try to match against loaded labels вЂ” use ref to always get latest value
    // (important for camera scanning where the callback closure can be stale)
    const currentLabels = labelsRef.current;
    const currentScans = scansRef.current;

    const matchIdx = currentLabels.findIndex(l =>
      l.id === scannedId ||
      l.shipId === scannedId ||
      l.packId === scannedId ||
      l.ventaId === scannedId ||
      l.envioExterno === scannedId
    );

    if (matchIdx === -1) {
      if (scanSource === 'AGENCIA') {
        const agencyPending = currentLabels.filter(l => l.source === 'AGENCIA' && !l.matched);
        if (agencyPending.length > 0) {
          setAgencyMatchModal({ raw, scannedId, scanSource, candidates: agencyPending });
        } else {
          const newToast = {
            id: Date.now()+Math.random(),
            title: 'рџ“¦ QR de Agencia',
            body: `ID interno: ${scannedId} вЂ” No hay etiquetas de agencia pendientes. ВїAgregar como envГ­o manual?`,
            alarm: true, scanRaw: raw, scanSource,
            actions: [{ label: 'SГ­, agregar', value: 'add_scan', variant: 'primary' }, { label: 'Ignorar', value: 'ignore', variant: 'ghost' }]
          };
          setToasts(p => [...p, newToast]);
          playAlarm();
        }
      } else {
        const newToast = {
          id: Date.now()+Math.random(),
          title: 'рџљЁ Escaneo sin etiqueta',
          body: `ID: ${scannedId} (${scanSource}) вЂ” No estГЎ en los PDFs cargados. ВїAgregar como envГ­o manual?`,
          alarm: true, scanRaw: raw, scanSource,
          actions: [{ label: 'SГ­, agregar', value: 'add_scan', variant: 'primary' }, { label: 'Ignorar', value: 'ignore', variant: 'ghost' }]
        };
        setToasts(p => [...p, newToast]);
        playAlarm();
      }
    } else {
      // Match! Use ref values to avoid stale closure
      const updLabels = currentLabels.map((l,i) => i===matchIdx ? {...l, matched:true, matchedAt: new Date().toISOString()} : l);
      const newScan = { raw, scannedId, scanSource, ts: new Date().toISOString(), matched: true, labelId: currentLabels[matchIdx].id };
      const updScans = [...currentScans, newScan];
      setLabels(updLabels);
      setScans(updScans);
      const toPersistScan = updLabels.map(({pdfCacheKey, text, thumb, hdThumb, ...r}) => r);
      await db.collection('sessions').doc(session.id).update({ labels: toPersistScan, scans: updScans });
      addToast('вњ… Paquete registrado', `EnvГ­o ${scannedId} вЂ” ${currentLabels[matchIdx].dest || currentLabels[matchIdx].loc || ''}`);
    }
    scanRef.current?.focus();
  };

  // в”Ђв”Ђ Computed в”Ђв”Ђ
  const matched   = labels.filter(l => l.matched);
  const unmatched = labels.filter(l => !l.matched);
  const manualScans = scans.filter(s => s.manual);

  // в”Ђв”Ђ Delete label(s) в”Ђв”Ђ
  const deleteLabel = async (id) => {
    if (!db || !session) return;
    const updated = labels.filter(l => l.id !== id);
    setLabels(updated);
    const toPersistDel = updated.map(({pdfCacheKey, text, thumb, hdThumb, ...rest}) => rest);
    await db.collection('sessions').doc(session.id).update({ labels: toPersistDel });
    addToast('Etiqueta eliminada', id);
  };

  const deleteScan = async (scanTs) => {
    if (!db || !session) return;
    // Find the scan to remove and also un-match its linked label if any
    const scanToDelete = scans.find(s => s.ts === scanTs);
    const updScans = scans.filter(s => s.ts !== scanTs);
    let updLabels = labels;
    if (scanToDelete?.labelId) {
      // Un-match the label that was matched by this scan
      updLabels = labels.map(l => l.id === scanToDelete.labelId ? {...l, matched: false, matchedAt: null} : l);
      setLabels(updLabels);
    }
    setScans(updScans);
    const toPersist = updLabels.map(({pdfCacheKey, text, thumb, hdThumb, ...rest}) => rest);
    await db.collection('sessions').doc(session.id).update({ labels: toPersist, scans: updScans });
    addToast('Escaneo eliminado', scanToDelete?.scannedId || '');
  };

  const deleteLabels = async (ids) => {
    if (!db || !session) return;
    const idSet = new Set(ids);
    const updated = labels.filter(l => !idSet.has(l.id));
    setLabels(updated);
    const toPersistDels = updated.map(({pdfCacheKey, text, thumb, hdThumb, ...rest}) => rest);
    await db.collection('sessions').doc(session.id).update({ labels: toPersistDels });
    addToast('Etiquetas eliminadas', `${ids.length} etiqueta(s) borradas`);
  };

  // в”Ђв”Ђ Close/Delete sessions from Historial tab (any date, not just today's) в”Ђв”Ђ
  // в”Ђв”Ђ Confirm agency label match manually в”Ђв”Ђ
  const confirmAgencyMatch = async (label) => {
    if (!db || !session) return;
    const { raw, scannedId, scanSource } = agencyMatchModal;
    const updLabels = labels.map(l => l.id === label.id ? {...l, matched:true, matchedAt: new Date().toISOString()} : l);
    const newScan = { raw, scannedId, scanSource, ts: new Date().toISOString(), matched: true, labelId: label.id };
    const updScans = [...scans, newScan];
    setLabels(updLabels);
    setScans(updScans);
    setAgencyMatchModal(null);
    const toPersistAgency = updLabels.map(({pdfCacheKey, text, thumb, hdThumb, ...r}) => r);
    await db.collection('sessions').doc(session.id).update({ labels: toPersistAgency, scans: updScans });
    addToast('вњ… Paquete de agencia registrado', `${label.dest || label.loc || label.id}`);
    scanRef.current?.focus();
  };

  const closeSessionById = async (sessionId) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).update({ open: false, closedAt: new Date().toISOString() });
      setSessions(p => p.map(s => s.id===sessionId ? {...s, open:false} : s));
      if (session?.id === sessionId) setSession(p => ({...p, open:false}));
      addToast('SesiГіn cerrada', 'Se actualizГі el estado en el historial');
    } catch(err) {
      addToast('Error', err.message || 'No se pudo cerrar la sesiГіn', 'alarm');
    }
  };

  const reopenSessionById = async (sessionId, dateLabel) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).update({ open: true, closedAt: null });
      // Load the full session data so it becomes the active working session
      const snap = await db.collection('sessions').doc(sessionId).get();
      const data = snap.data();
      const reopened = { id: sessionId, ...data, open: true };
      setSessions(p => p.map(s => s.id===sessionId ? reopened : s));
      setSession(reopened);
      setLabels(data.labels || []);
      setScans(data.scans || []);
      setTab('sesion'); // navigate to session tab so user can see it
      addToast('SesiГіn reabierta', `SesiГіn del ${dateLabel} cargada como activa. PodГ©s seguir escaneando.`);
    } catch(err) {
      addToast('Error', err.message || 'No se pudo reabrir la sesiГіn', 'alarm');
    }
  };

  const deleteSession = async (sessionId, dateLabel) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).delete();
      setSessions(p => p.filter(s => s.id !== sessionId));
      if (session?.id === sessionId) { setSession(null); setLabels([]); setScans([]); }
      addToast('SesiГіn eliminada', dateLabel || '');
    } catch(err) {
      addToast('Error', err.message || 'No se pudo eliminar la sesiГіn', 'alarm');
    }
  };

  // в”Ђв”Ђ Pending Modal в”Ђв”Ђ
  const handlePending = async (action) => {
    if (!db || !pendingModal) return;
    const updates = pendingModal.items.map(l => ({...l, discarded: action==='discard'}));
    // update that session
    const snap = await db.collection('sessions').doc(pendingModal.sessionId).get();
    const existing = snap.data().labels || [];
    const merged = existing.map(l => updates.find(u=>u.id===l.id) || l);
    const toPersistMerged = merged.map(({pdfCacheKey, text, thumb, hdThumb, ...r}) => r);
    await db.collection('sessions').doc(pendingModal.sessionId).update({ labels: toPersistMerged });
    if (action==='keep') {
      // Bring to today
      const todayUnmatched = updates.map(l=>({...l, fromDate: pendingModal.date, matched:false}));
      const mergedToday = [...labels, ...todayUnmatched.filter(l=>!labels.find(x=>x.id===l.id))];
      setLabels(mergedToday);
      if (session) { const toPersistToday = mergedToday.map(({pdfCacheKey, text, thumb, hdThumb, ...r}) => r); await db.collection('sessions').doc(session.id).update({ labels: toPersistToday }); }
      addToast('Etiquetas importadas', `${todayUnmatched.length} etiqueta(s) del ${pendingModal.date} agregadas a hoy`);
    }
    setPendingModal(null);
  };

  // в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  // config hardcoded, no setup needed

  const tabs = [
    {id:'sesion', label:'рџ“¦ SesiГіn'},
    {id:'escanear', label:'рџ“· Escanear'},
    {id:'resumen', label:'рџ“Љ Resumen'},
    {id:'historial', label:'рџ—“ Historial'},
    {id:'config', label:'вљ™пёЏ Config'},
  ];

  return (
    <div className="app">
      <ToastContainer toasts={toasts} onAction={handleToastAction} onDismiss={dismissToast} />
      <ScrollNav />

      {/* Pending modal */}
      {pendingModal && (
        <div className="overlay">
          <div className="modal">
            <div className="modal-title">рџ“‹ Etiquetas pendientes de ayer ({pendingModal.date})</div>
            <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>
              {pendingModal.items.length} etiqueta(s) del dГ­a anterior no tuvieron escaneo. ВїQuГ© hacemos?
            </p>
            <div style={{maxHeight:200,overflowY:'auto',marginBottom:16}}>
              {pendingModal.items.map(l => (
                <div key={l.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  {l.thumb && <img src={l.thumb} className="label-thumb" onClick={()=>setImgModal(l)} />}
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{l.id}</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>{l.dest} В· {l.loc}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-primary" onClick={()=>handlePending('keep')}>
                рџ“Ґ Mantener para hoy
              </button>
              <button className="btn btn-danger" onClick={()=>handlePending('discard')}>
                рџ—‘ Descartar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Image modal */}
      {imgModal && <LabelImageModal label={imgModal} onClose={()=>setImgModal(null)} />}
      {cameraOpen && <CameraScanner onResult={(data)=>{ handleScan(data); }} onClose={()=>setCameraOpen(false)} />}

      {/* Agency manual match modal */}
      {agencyMatchModal && (
        <div className="overlay" onClick={()=>setAgencyMatchModal(null)}>
          <div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">рџ“¦ ВїCuГЎl es este paquete de agencia?</div>
            <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>
              El QR escaneado es de una etiqueta externa (GURA/Agencia). TocГЎ el paquete que corresponde para registrarlo:
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:10,maxHeight:400,overflowY:'auto'}}>
              {agencyMatchModal.candidates.map(l => (
                <button key={l.id} className="btn btn-ghost" style={{justifyContent:'flex-start',gap:12,padding:'12px 14px',textAlign:'left'}}
                  onClick={()=>confirmAgencyMatch(l)}>
                  {l.thumb && <img src={l.thumb} style={{width:60,height:80,objectFit:'cover',borderRadius:4,flexShrink:0}} />}
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{l.dest||'Sin nombre'}</div>
                    <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{[l.partido,l.loc].filter(Boolean).join(' / ')||'вЂ”'} В· CP {l.cp||'вЂ”'}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>SKU: {l.sku||'вЂ”'} В· EnvГ­o: {l.id}</div>
                  </div>
                </button>
              ))}
            </div>
            <div style={{marginTop:16,display:'flex',justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setAgencyMatchModal(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}


      <header className="header">
        <div className="logo">
          <span className="logo-badge">FLEX</span>
          <span className="logo-text">Control de Entregas</span>
        </div>
        <div className="header-right">
          {session && (
            <span className={`badge ${session.open ? 'badge-green' : 'badge-red'}`}>
              {session.open ? 'в—Џ SesiГіn abierta' : 'в—‹ SesiГіn cerrada'} {session.date}
            </span>
          )}

        </div>
      </header>

      <nav className="nav">
        {tabs.map(t => <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </nav>

      <main className="main">

        {/* в”Ђв”Ђ SESIГ“N TAB в”Ђв”Ђ */}
        {tab==='sesion' && (
          <>
            <div className="section-title">SesiГіn del dГ­a</div>

            {!session ? (
              <div className="card" style={{textAlign:'center',padding:40}}>
                <div style={{fontSize:40,marginBottom:12}}>рџ“¦</div>
                <p style={{color:'var(--muted)',marginBottom:20}}>No hay sesiГіn abierta para hoy</p>
                <button className="btn btn-primary" onClick={openSession} disabled={loading}>
                  {loading ? <span className="spinner"/> : null} Abrir sesiГіn de hoy
                </button>
              </div>
            ) : (
              <>
                <div className={`session-bar ${session.open?'':'closed'}`}>
                  <div>
                    <strong>{session.date}</strong>
                    <span style={{marginLeft:12,color:'var(--muted)',fontSize:13}}>
                      {session.open ? 'SesiГіn activa вЂ” podГ©s cargar PDFs y escanear' : 'SesiГіn cerrada'}
                    </span>
                  </div>
                  {session.open && (
                    <button className="btn btn-danger" onClick={closeSession}>Cerrar sesiГіn</button>
                  )}
                </div>

                <div className="stats">
                  <div className="stat"><div className="stat-val">{labels.length}</div><div className="stat-label">Etiquetas cargadas</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Escaneados вњ“</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{unmatched.length}</div><div className="stat-label">Sin escanear</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--blue)'}}>{manualScans.length}</div><div className="stat-label">EnvГ­os manuales</div></div>
                </div>

                {/* Upload PDFs */}
                {session.open && (
                  <div className="card">
                    <div className="card-title">Cargar etiquetas PDF</div>
                    <div className="dropzone" onDragOver={e=>e.preventDefault()} onDrop={handlePDFDrop} onClick={()=>document.getElementById('pdfInput').click()}>
                      <div className="dropzone-icon">{loading ? 'вЏі' : 'рџ“„'}</div>
                      <div className="dropzone-text">{loading ? 'Procesando PDF...' : 'ArrastrГЎ los PDF de etiquetas aquГ­, o hacГ© click'}</div>
                      <input id="pdfInput" type="file" accept=".pdf" multiple style={{display:'none'}} onChange={handlePDFDrop} />
                    </div>
                    {loading && <div className="progress-bar" style={{marginTop:8}}><div className="progress-fill" style={{width:'60%'}} /></div>}
                  </div>
                )}

                {/* Labels table */}
                {labels.length > 0 && (
                  <div className="card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                      <div className="card-title" style={{marginBottom:0}}>Etiquetas en sesiГіn ({labels.length})</div>
                      {selectedLabels.length > 0 && (
                        <button className="btn btn-danger" style={{fontSize:12,padding:'6px 12px'}}
                          onClick={()=>{ if(confirm(`ВїBorrar ${selectedLabels.length} etiqueta(s) seleccionada(s)?`)){ deleteLabels(selectedLabels); setSelectedLabels([]); } }}>
                          рџ—‘ Borrar {selectedLabels.length} seleccionada(s)
                        </button>
                      )}
                    </div>
                    <div style={{overflowX:'auto'}}>
                      <table className="tbl">
                        <thead><tr>
                          <th style={{width:30}}>
                            <input type="checkbox" checked={selectedLabels.length===labels.length && labels.length>0}
                              onChange={e=>setSelectedLabels(e.target.checked ? labels.map(l=>l.id) : [])} />
                          </th>
                          <th>Etiqueta</th><th>EnvГ­o ID</th><th>SKU</th><th>Destinatario</th><th>Localidad</th><th>CP</th><th>Estado</th><th></th>
                        </tr></thead>
                        <tbody>
                          {labels.map(l => (
                            <tr key={l.id}>
                              <td>
                                <input type="checkbox" checked={selectedLabels.includes(l.id)}
                                  onChange={e=> setSelectedLabels(p => e.target.checked ? [...p,l.id] : p.filter(x=>x!==l.id)) } />
                              </td>
                              <td>{l.thumb && <img src={l.thumb} className="label-thumb" onClick={()=>setImgModal(l)} />}</td>
                              <td style={{fontFamily:'monospace',fontSize:12}}>{l.id}</td>
                              <td><span className="chip">{l.sku||'вЂ”'}</span>{heavySkus.includes(l.sku) && <span className="badge badge-yellow" style={{marginLeft:4}}>вљ–пёЏ Pesado</span>}{l.source==='AGENCIA' && <span className="badge badge-blue" style={{marginLeft:4}}>Agencia</span>}</td>
                              <td style={{fontSize:12}}>{l.dest||'вЂ”'}</td>
                              <td style={{fontSize:11}}>{[l.partido, l.loc].filter(Boolean).join(' / ') || 'вЂ”'}</td>
                              <td>{l.cp||'вЂ”'}</td>
                              <td>{l.matched ? <span className="badge badge-green">вњ“ Escaneado</span> : <span className="badge badge-yellow">Pendiente</span>}</td>
                              <td>
                                <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:13}}
                                  title="Borrar esta etiqueta"
                                  onClick={()=>{ const msg = l.matched ? `La etiqueta ${l.id} ya fue escaneada. El registro del escaneo se conserva, pero quedarГЎ sin etiqueta vinculada hasta que vuelvas a cargar el PDF. ВїBorrar igual?` : `ВїBorrar la etiqueta ${l.id}?`; if(confirm(msg)) deleteLabel(l.id); }}>
                                  рџ—‘
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* в”Ђв”Ђ ESCANEAR TAB в”Ђв”Ђ */}
        {tab==='escanear' && (
          <>
            <div className="section-title">Escanear paquetes</div>
            {!session?.open ? (
              <div className="card empty"><div className="empty-icon">рџ”’</div><p>AbrГ­ una sesiГіn para escanear</p></div>
            ) : (
              <>
                <div className="card">
                  <div className="card-title">ApuntГЎ la pistola lectora aquГ­</div>
                  <div className="scan-input-wrap">
                    <span className="scan-icon">в–¦</span>
                    <input
                      ref={scanRef}
                      className="input"
                      value={scanInput}
                      onChange={e=>setScanInput(e.target.value)}
                      onKeyDown={e=>{ if(e.key==='Enter') handleScan(scanInput); }}
                      placeholder="EscaneГЎ el QR del paquete o escribГ­ el ID..."
                      autoFocus
                    />
                  </div>
                  <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>La pistola lectora hace Enter automГЎticamente al terminar de leer el QR</p>
                  <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
                    <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
                    <span style={{color:'var(--muted)',fontSize:12}}>o</span>
                    <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
                  </div>
                  <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setCameraOpen(true)}>
                    рџ“· Escanear con la cГЎmara
                  </button>
                </div>

                <div className="stats">
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Entregados a moto</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{unmatched.length}</div><div className="stat-label">Restantes</div></div>
                </div>

                {scans.length > 0 && (
                  <div className="card">
                    <div className="card-title">Escaneos de esta sesiГіn ({scans.length})</div>
                    <div style={{overflowX:'auto'}}>
                      <table className="tbl">
                        <thead><tr><th>ID</th><th>Hora</th><th>Tipo</th><th></th></tr></thead>
                        <tbody>
                          {[...scans].reverse().map((s,i) => (
                            <tr key={i}>
                              <td style={{fontFamily:'monospace',fontSize:12}}>{s.scannedId || s.raw?.slice(0,30)}</td>
                              <td style={{fontSize:12,color:'var(--muted)'}}>{new Date(s.ts).toLocaleTimeString('es-AR')}</td>
                              <td>{s.manual ? <span className="badge badge-blue">Manual</span> : s.scanSource === 'AGENCIA' ? <span className="badge badge-yellow">Agencia</span> : <span className="badge badge-green">FLEX</span>}</td>
                              <td>
                                <button className="btn btn-ghost" style={{padding:'4px 8px',fontSize:12}}
                                  title="Eliminar este escaneo"
                                  onClick={()=>{ if(confirm(`ВїEliminar el escaneo ${s.scannedId||''}? Si tenГ­a una etiqueta vinculada, vuelve a quedar como pendiente.`)) deleteScan(s.ts); }}>
                                  рџ—‘
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* в”Ђв”Ђ RESUMEN TAB в”Ђв”Ђ */}
        {tab==='resumen' && (
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div className="section-title" style={{marginBottom:0}}>Resumen de sesiГіn</div>
              {session && labels.length > 0 && (
                <button className="btn btn-primary" onClick={()=>generateSessionReport(session, labels, scans, zones, heavySkus, folderHandleRef.current)}>
                  рџ“„ Generar informe PDF
                </button>
              )}
            </div>
            {!session ? (
              <div className="card empty"><div className="empty-icon">рџ“Љ</div><p>No hay sesiГіn activa</p></div>
            ) : (
              <>
                <div className="stats">
                  <div className="stat"><div className="stat-val">{labels.length}</div><div className="stat-label">Total etiquetas</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Entregados a moto</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--red)'}}>{unmatched.length}</div><div className="stat-label">No escaneados</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{labels.filter(l=>heavySkus.includes(l.sku)).length}</div><div className="stat-label">вљ–пёЏ Pesados</div></div>
                </div>

                {/* Zone summary вЂ” FIRST after stats */}
                {zones.length > 0 && labels.length > 0 && (
                  <div className="card">
                    <div className="card-title">EstimaciГіn de costo ({session.date})</div>
                    {(() => {
                      const cost = calcSessionCost(labels, zones, heavySkus);
                      if (cost.byZone.length === 0 && cost.unzonedCount === 0) {
                        return <p style={{color:'var(--muted)',fontSize:13}}>TodavГ­a no hay paquetes escaneados que coincidan con una zona configurada.</p>;
                      }
                      return (
                        <div style={{overflowX:'auto'}}>
                          <table className="tbl">
                            <thead><tr><th>Zona/Localidad</th><th>Cant.</th><th>Pesados</th><th>Tarifa</th><th>Subtotal</th></tr></thead>
                            <tbody>
                              {cost.byZone.map(z => (
                                <tr key={z.name}>
                                  <td>{z.displayName||z.name}</td>
                                  <td>{z.count}</td>
                                  <td>{z.heavyCount > 0 ? <span className="badge badge-yellow">вљ–пёЏ {z.heavyCount}</span> : 'вЂ”'}</td>
                                  <td>${z.price.toLocaleString('es-AR')}</td>
                                  <td style={{fontWeight:700}}>${z.subtotal.toLocaleString('es-AR')}</td>
                                </tr>
                              ))}
                              {cost.unzonedCount > 0 && (
                                <tr>
                                  <td style={{color:'var(--accent)'}} colSpan={4}>вљ пёЏ Sin zona asignada вЂ” {cost.unzonedCount} paquete(s) ({cost.unzoned.map(l=>[l.partido,l.loc].filter(Boolean).join('/')||l.cp||l.id).join(', ')})</td>
                                  <td style={{color:'var(--muted)'}}>вЂ”</td>
                                </tr>
                              )}
                              <tr>
                                <td colSpan={4} style={{fontWeight:700,textAlign:'right'}}>
                                  Total del dГ­a ({cost.matchedCount} entregados, {cost.unzonedCount > 0 ? `${cost.matchedCount - cost.unzonedCount} con zona` : 'todos con zona'})
                                </td>
                                <td style={{fontWeight:800,color:'var(--accent)'}}>${cost.total.toLocaleString('es-AR')}</td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      );
                    })()}
                  </div>
                )}

                {/* Matched labels photos */}
                {matched.length > 0 && (
                  <div className="card">
                    <div className="card-title" style={{color:'var(--green)'}}>вњ… Entregados a moto ({matched.length})</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
                      {matched.map(l => (
                        <div key={l.id} style={{background:'var(--surface2)',border:'1px solid rgba(34,197,94,.3)',borderRadius:8,padding:12,width:140}}>
                          {l.thumb && <img src={l.thumb} style={{width:'100%',borderRadius:4,marginBottom:8,cursor:'pointer'}} onClick={()=>setImgModal(l)} />}
                          <div style={{fontSize:11,fontFamily:'monospace',wordBreak:'break-all'}}>{l.id}</div>
                          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{[l.partido,l.loc].filter(Boolean).join(' / ')||l.cp||'вЂ”'}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Unmatched labels */}
                {unmatched.length > 0 && (
                  <div className="card">
                    <div className="card-title" style={{color:'var(--accent)'}}>вљ пёЏ Sin escanear вЂ” No entregados a moto ({unmatched.length})</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
                      {unmatched.map(l => (
                        <div key={l.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:12,width:140,position:'relative'}}>
                          <button className="btn btn-ghost" style={{position:'absolute',top:6,right:6,padding:'3px 6px',fontSize:11,zIndex:1}}
                            title="Borrar esta etiqueta"
                            onClick={()=>{ const msg = l.matched ? `La etiqueta ${l.id} ya fue escaneada. El registro del escaneo se conserva, pero quedarГЎ sin etiqueta vinculada hasta que vuelvas a cargar el PDF. ВїBorrar igual?` : `ВїBorrar la etiqueta ${l.id}?`; if(confirm(msg)) deleteLabel(l.id); }}>
                            рџ—‘
                          </button>
                          {l.thumb && <img src={l.thumb} style={{width:'100%',borderRadius:4,marginBottom:8,cursor:'pointer'}} onClick={()=>setImgModal(l)} />}
                          <div style={{fontSize:11,fontFamily:'monospace',wordBreak:'break-all'}}>{l.id}</div>
                          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{[l.partido,l.loc].filter(Boolean).join(' / ')||l.cp||'вЂ”'}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* в”Ђв”Ђ HISTORIAL TAB в”Ђв”Ђ */}
        {tab==='historial' && (
          <>
            <div className="section-title">Historial de sesiones</div>
            {sessions.length === 0 ? (
              <div className="card empty"><div className="empty-icon">рџ—“</div><p>No hay sesiones guardadas</p></div>
            ) : (
              <>
                <div className="card">
                  <div style={{overflowX:'auto'}}>
                    <table className="tbl">
                      <thead><tr><th>Fecha</th><th>Etiquetas</th><th>Escaneados</th><th>No escaneados</th><th>Costo</th><th>Estado</th><th>Acciones</th></tr></thead>
                      <tbody>
                        {sessions.map(s => {
                          const lbs = s.labels||[];
                          const sc = lbs.filter(l=>l.matched);
                          const un = lbs.filter(l=>!l.matched);
                          const cost = calcSessionCost(lbs, zones, heavySkus);
                          return (
                            <tr key={s.id}>
                              <td style={{fontWeight:600}}>{s.date}</td>
                              <td>{lbs.length}</td>
                              <td><span className="badge badge-green">{sc.length}</span></td>
                              <td>{un.length > 0 ? <span className="badge badge-yellow">{un.length}</span> : <span className="badge badge-green">0</span>}</td>
                              <td style={{fontWeight:600}}>{cost.total > 0 ? `$${cost.total.toLocaleString('es-AR')}` : 'вЂ”'}</td>
                              <td>{s.open ? <span className="badge badge-blue">Abierta</span> : <span className="badge badge-red">Cerrada</span>}</td>
                              <td>
                                <div style={{display:'flex',gap:6}}>
                                  {s.open ? (
                                    <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12}}
                                      title="Cerrar esta sesiГіn"
                                      onClick={()=>{ if(confirm(`ВїCerrar la sesiГіn del ${s.date}?`)) closeSessionById(s.id); }}>
                                      рџ”’ Cerrar
                                    </button>
                                  ) : (
                                    <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12}}
                                      title="Reabrir esta sesiГіn para seguir escaneando"
                                      onClick={()=>{ if(confirm(`ВїReabrir la sesiГіn del ${s.date}? PodrГЎs volver a escanear paquetes.`)) reopenSessionById(s.id, s.date); }}>
                                      рџ”“ Reabrir
                                    </button>
                                  )}
                                  <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12,color:'var(--red)'}}
                                    title="Eliminar esta sesiГіn por completo"
                                    onClick={()=>{ if(confirm(`ВїEliminar definitivamente la sesiГіn del ${s.date}? Esto borra sus etiquetas y escaneos guardados, no se puede deshacer.`)) deleteSession(s.id, s.date); }}>
                                    рџ—‘
                                  </button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                <BillingRangePanel sessions={sessions} zones={zones} heavySkus={heavySkus} folderHandleRef={folderHandleRef} />
              </>
            )}
          </>
        )}

        {/* в”Ђв”Ђ CONFIG TAB в”Ђв”Ђ */}
        {tab==='config' && (
          <>
            <ConfigPanel db={db} heavySkus={heavySkus} setHeavySkus={setHeavySkus} zones={zones} setZones={setZones} addToast={addToast} onSelectFolder={selectLocalFolder} folderName={folderName} />
          </>
        )}

      </main>
    </div>
  );
}

// в”Ђв”Ђв”Ђ CONFIG PANEL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function ConfigPanel({ db, heavySkus, setHeavySkus, zones, setZones, addToast, onSelectFolder, folderName }) {
  const [newSku, setNewSku] = useState('');
  const [newZone, setNewZone] = useState({ name:'', cp:'', price:'' });
  const [importingSkus, setImportingSkus] = useState(false);
  const [importingZones, setImportingZones] = useState(false);

  const addSku = async () => {
    if (!newSku.trim()) return;
    const updated = [...heavySkus, newSku.trim().toUpperCase()];
    setHeavySkus(updated);
    setNewSku('');
    if (db) await db.collection('config').doc('heavy_skus').set({ list: updated });
    addToast('SKU agregado', newSku.trim().toUpperCase());
  };

  const removeSku = async (sku) => {
    const updated = heavySkus.filter(s=>s!==sku);
    setHeavySkus(updated);
    if (db) await db.collection('config').doc('heavy_skus').set({ list: updated });
  };

  const addZone = async () => {
    if (!newZone.name || !newZone.price) return;
    const z = { name: newZone.name, cp: newZone.cp, price: Number(newZone.price) };
    const updated = [...zones, z];
    setZones(updated);
    setNewZone({ name:'', cp:'', price:'' });
    if (db) await db.collection('config').doc('zones').set({ list: updated });
    addToast('Zona agregada', z.name);
  };

  const removeZone = async (name) => {
    const updated = zones.filter(z=>z.name!==name);
    setZones(updated);
    if (db) await db.collection('config').doc('zones').set({ list: updated });
  };

  // Find a column value in a row object by trying several possible header name fragments
  const findCol = (row, candidates) => {
    const keys = Object.keys(row);
    for (const cand of candidates) {
      const k = keys.find(k => k.toLowerCase().trim().includes(cand));
      if (k && row[k] !== undefined && row[k] !== '') return row[k];
    }
    return null;
  };

  // в”Ђв”Ђ Import heavy SKUs from Excel/CSV в”Ђв”Ђ
  // Expected: a column with "sku" in its header. Any other columns are ignored.
  const importSkusFromExcel = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportingSkus(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { addToast('Archivo vacГ­o', 'No se encontraron filas en la hoja', 'alarm'); return; }

      const found = rows
        .map(r => findCol(r, ['sku']))
        .filter(v => v !== null && String(v).trim() !== '')
        .map(v => String(v).trim().toUpperCase());

      if (!found.length) {
        addToast('No se encontrГі la columna SKU', 'Asegurate de tener una columna con encabezado "SKU"', 'alarm');
        return;
      }
      const merged = [...new Set([...heavySkus, ...found])];
      setHeavySkus(merged);
      if (db) await db.collection('config').doc('heavy_skus').set({ list: merged });
      addToast('SKUs importados', `${found.length} SKU(s) leГ­dos del archivo, ${merged.length} en total`);
    } catch(err) {
      addToast('Error al leer el archivo', err.message || 'RevisГЎ que sea un .xlsx o .csv vГЎlido', 'alarm');
    } finally {
      setImportingSkus(false);
      e.target.value = '';
    }
  };

  // в”Ђв”Ђ Import zone tariffs from Excel/CSV в”Ђв”Ђ
  // Expected columns (flexible headers): one with "zona"/"localidad", one with "cp"/"codigo",
  // and one with "tarifa"/"precio"/"valor"/"costo".
  const importZonesFromExcel = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportingZones(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { addToast('Archivo vacГ­o', 'No se encontraron filas en la hoja', 'alarm'); return; }

      const parsedZones = rows.map(r => {
        const name = findCol(r, ['zona', 'localidad', 'destino', 'barrio']);
        const cp = findCol(r, ['cp', 'codigo postal', 'cГіdigo postal']);
        const priceRaw = findCol(r, ['tarifa', 'precio', 'valor', 'costo']);
        const price = priceRaw !== null ? Number(String(priceRaw).replace(/[^\d.,-]/g,'').replace(',','.')) : NaN;
        if (!name || isNaN(price)) return null;
        return { name: String(name).trim(), cp: cp ? String(cp).trim() : '', price };
      }).filter(Boolean);

      if (!parsedZones.length) {
        addToast('No se pudieron leer zonas', 'VerificГЎ que haya columnas de Zona/Localidad y Tarifa/Precio con valores numГ©ricos', 'alarm');
        return;
      }
      // merge by name, new file overrides existing price for same zone name
      const merged = [...zones];
      parsedZones.forEach(z => {
        const idx = merged.findIndex(m => m.name.toLowerCase() === z.name.toLowerCase());
        if (idx >= 0) merged[idx] = z; else merged.push(z);
      });
      setZones(merged);
      if (db) await db.collection('config').doc('zones').set({ list: merged });
      addToast('Zonas importadas', `${parsedZones.length} zona(s) leГ­das del archivo, ${merged.length} en total`);
    } catch(err) {
      addToast('Error al leer el archivo', err.message || 'RevisГЎ que sea un .xlsx o .csv vГЎlido', 'alarm');
    } finally {
      setImportingZones(false);
      e.target.value = '';
    }
  };

  return (
    <>
      <div className="section-title">ConfiguraciГіn</div>

      {/* Heavy SKUs */}
      <div className="card">
        <div className="card-title">вљ–пёЏ SKUs de envГ­os pesados (pagan doble)</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
          {heavySkus.length === 0 && <span style={{color:'var(--muted)',fontSize:13}}>No hay SKUs cargados</span>}
          {heavySkus.map(s => (
            <span key={s} className="chip" style={{cursor:'pointer'}} onClick={()=>removeSku(s)}>
              {s} <span style={{color:'var(--red)',marginLeft:4}}>вњ•</span>
            </span>
          ))}
        </div>
        <div className="input-row">
          <input className="input" placeholder="Ej: A158WA-1D" value={newSku} onChange={e=>setNewSku(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSku()} />
          <button className="btn btn-primary" onClick={addSku}>Agregar</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
          <span style={{color:'var(--muted)',fontSize:12}}>o</span>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
        </div>
        <label className="btn btn-ghost" style={{width:'100%',justifyContent:'center',cursor:'pointer'}}>
          {importingSkus ? <span className="spinner"/> : 'рџ“‚'} Importar desde Excel/CSV
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importSkusFromExcel} disabled={importingSkus} />
        </label>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>El archivo debe tener una columna con encabezado "SKU"</p>
      </div>

      {/* Zones */}
      <div className="card">
        <div className="card-title">рџ—є Tarifas por zona/localidad</div>
        {zones.length > 0 && (
          <div style={{overflowX:'auto',marginBottom:16}}>
            <table className="tbl">
              <thead><tr><th>Zona/Localidad</th><th>CP</th><th>Tarifa ($)</th><th></th></tr></thead>
              <tbody>
                {zones.map(z => (
                  <tr key={z.name}>
                    <td>{z.name}</td>
                    <td>{z.cp||'вЂ”'}</td>
                    <td>${z.price.toLocaleString('es-AR')}</td>
                    <td><button className="btn btn-ghost" style={{padding:'4px 8px',fontSize:12}} onClick={()=>removeZone(z.name)}>вњ•</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px 120px auto',gap:8,alignItems:'center'}}>
          <input className="input" placeholder="Localidad" value={newZone.name} onChange={e=>setNewZone(p=>({...p,name:e.target.value}))} />
          <input className="input" placeholder="CP" value={newZone.cp} onChange={e=>setNewZone(p=>({...p,cp:e.target.value}))} />
          <input className="input" placeholder="$ tarifa" type="number" value={newZone.price} onChange={e=>setNewZone(p=>({...p,price:e.target.value}))} />
          <button className="btn btn-primary" onClick={addZone}>Agregar</button>
        </div>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:10}}>Los envГ­os pesados se calculan como tarifa Г— 2</p>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
          <span style={{color:'var(--muted)',fontSize:12}}>o</span>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
        </div>
        <label className="btn btn-ghost" style={{width:'100%',justifyContent:'center',cursor:'pointer'}}>
          {importingZones ? <span className="spinner"/> : 'рџ“‚'} Importar desde Excel/CSV
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importZonesFromExcel} disabled={importingZones} />
        </label>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>Columnas esperadas: Zona/Localidad, CP (opcional), Tarifa/Precio. Si una zona ya existe, se actualiza su tarifa.</p>
      </div>

      {/* Local folder */}
      <div className="card">
        <div className="card-title">рџ’ѕ Carpeta local de archivos</div>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:12,lineHeight:1.6}}>
          ElegГ­ una carpeta en tu PC donde la app guardarГЎ automГЎticamente:<br/>
          вЂў Los PDFs de etiquetas que subas (organizados por fecha en subcarpetas)<br/>
          вЂў Los informes PDF y Excel que generes
        </p>
        {folderName && (
          <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',borderRadius:8,padding:'10px 14px',marginBottom:12}}>
            <span style={{fontSize:18}}>рџ“Ѓ</span>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{folderName}</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>Carpeta activa вЂ” se guardarГЎ hasta que cierres el navegador</div>
            </div>
          </div>
        )}
        <button className="btn btn-primary" onClick={onSelectFolder} disabled={!isFileSystemAccessSupported()}>
          рџ“Ѓ {folderName ? 'Cambiar carpeta local' : 'Seleccionar carpeta local'}
        </button>
        {!isFileSystemAccessSupported() && (
          <p style={{color:'var(--accent)',fontSize:12,marginTop:8}}>вљ пёЏ Solo disponible en Chrome o Edge en PC. Safari y Firefox no soportan esta funciГіn.</p>
        )}
        <p style={{color:'var(--muted)',fontSize:11,marginTop:8}}>La selecciГіn se pierde al cerrar el navegador вЂ” hay que elegirla de nuevo la prГіxima sesiГіn. Es una limitaciГіn del navegador por seguridad.</p>
      </div>

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
