    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #f5c518;
    --accent2: #e05c2a;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e8eaf0;
    --muted: #8891a8;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-badge { background: var(--accent); color: #000; font-weight: 900; font-size: 13px; padding: 4px 8px; border-radius: 5px; letter-spacing: 1px; }
  .logo-text { font-size: 16px; font-weight: 600; color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; }
  .nav-btn { padding: 12px 18px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .2s; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-btn:hover { color: var(--text); }

  .main { flex: 1; padding: 20px; max-width: 960px; margin: 0 auto; width: 100%; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 16px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #ffd43b; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--green); color: #000; }
  .btn-success:hover { background: #16a34a; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-red { background: rgba(239,68,68,.15); color: var(--red); }
  .badge-yellow { background: rgba(245,197,24,.15); color: var(--accent); }

  /* INPUTS */

  .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }

  /* TABLE */

  .tbl th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; }
  .tbl td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }

  .dropzone-icon { font-size: 36px; margin-bottom: 10px; }

  /* TOAST */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: 340px; }
  .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 8px 32px rgba(0,0,0,.4); animation: slideIn .3s ease; }
  .toast.alarm { border-color: var(--red); background: #1f0d0d; }
  .toast-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .toast-body { font-size: 13px; color: var(--muted); }
  .toast-actions { display: flex; gap: 8px; margin-top: 10px; }
  @keyframes slideIn { from { transform: translateX(120%); opacity:0; } to { transform: translateX(0); opacity:1; } }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; max-width: 520px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

  /* SETUP */
  .setup-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 36px; max-width: 480px; width: 100%; }
  .setup-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }

  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }

  /* SCANNER INPUT */
  .scan-input-wrap { position: relative; }
  .scan-input-wrap .input { padding-left: 42px; font-size: 15px; }
  .scan-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }

  /* CONFIG TAB */
  .config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .config-row .input { flex: 1; }

  /* RESPONSIVE */
  @media(max-width:600px) {
    .main { padding: 12px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat-val { font-size: 24px; }
    .modal { padding: 20px; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  .label-thumb { width: 90px; height: 120px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; transition: transform .15s; }
  .label-thumb:hover { transform: scale(1.05); }

  .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; margin: 2px; }

  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ FIREBASE CONFIG ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ AUDIO ALARM ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const times = [0, 0.3, 0.6];
    times.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.25);
    });
  } catch(e) {}
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ COST CALCULATION (shared between Resumen, Historial, and date-range billing) ΟΔβÄùβ²§ΟΔβÄùβ²§
// Returns { byZone: [{name, cp, count, heavyCount, price, subtotal}], total, matchedCount, unmatchedCount }
function calcSessionCost(sessionLabels, zones, heavySkus) {
  const matched = (sessionLabels || []).filter(l => l.matched);
  const byZone = zones.map(z => {
    const inZone = matched.filter(l => (l.loc||'').toLowerCase().includes(z.name.toLowerCase()) || (l.cp && l.cp === z.cp));
    const heavyInZone = inZone.filter(l => heavySkus.includes(l.sku));
    // Heavy shipments pay for an extra trip (price counted twice: once normal, once extra)
    const subtotal = inZone.length * z.price + heavyInZone.length * z.price;
    return { name: z.name, cp: z.cp, count: inZone.length, heavyCount: heavyInZone.length, price: z.price, subtotal };
  }).filter(z => z.count > 0);
  const total = byZone.reduce((sum, z) => sum + z.subtotal, 0);
  return {
    byZone,
    total,
    matchedCount: matched.length,
    unmatchedCount: (sessionLabels || []).filter(l => !l.matched).length
  };
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ PDF PARSER ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
const pdfBufferCache = {}; // fileName -> ArrayBuffer (in-memory, this browser session only)

async function parseLabelsPDF(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buf = await file.arrayBuffer();
  // Keep a copy in memory so we can re-render any page in HD instantly, no upload needed
  const cacheKey = `${file.name}_${file.size}`;
  pdfBufferCache[cacheKey] = buf.slice(0); // slice(0) clones, since pdf.js consumes the buffer

  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const labels = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    const text = tc.items.map(it => it.str).join(' ');

    // Extract fields
    const shipId = (text.match(/Envio[:\s]+(\d[\d\s]{6,12}\d)/i) || [])[1]?.replace(/\s/g,'') || null;
    const packId = (text.match(/Pack ID[:\s]*([\d]+)/i) || [])[1] || null;
    const sku    = (text.match(/SKU[:\s:]*([A-Z0-9\-]+)/i) || [])[1] || null;
    const cp     = (text.match(/CP[:\s]*(\d{4,5})/i) || [])[1] || null;
    const dest   = (text.match(/Destinatario[:\s]*([^\n(]+)/i) || [])[1]?.trim() || null;
    const loc    = (text.match(/\b(TIGRE|PILAR|ESCOBAR|GARΟÉ¬çN|DERQUI|DON TORCUATO|MALVINAS ARGENTINAS|GRAND BOURG|LOS POLVORINES|VILLA ROSA|ZΟÉ¬¹RATE|CAMPANA|SAN ISIDRO|VICENTE LΟÉβÄ€PEZ|OLIVOS|MUNRO|FLORIDA|MARTΟÉ¬çNEZ|SAN FERNANDO|PACHECO|PALERMO|BELGRANO|CABALLITO|FLORES|VILLA CRESPO|ALMAGRO|BOEDO|NΟÉ≈ΓΟÉβÄ‰EZ|SAAVEDRA|VILLA URQUIZA|DEVOTO|MONTE GRANDE|AVELLANEDA|QUILMES|BERAZATEGUI|FLORENCIO VARELA|LANΟÉ≈ΓS|LOMAS DE ZAMORA|BANFIELD|TEMPERLEY|ADROGUΟÉβÄΑ|BURZACO|GLEW|CAΟÉβÄ‰UELAS|MORΟÉβÄ€N|HAEDO|RAMOS MEJΟÉ¬çA|SAN JUSTO|MERLO|MORENO|ITUZAINGΟÉβÄ€|CASTELAR|PALERMO|RECOLETA|SAN TELMO|MICROCENTRO|[A-Z\s]{5,})\b/i) || [])[1]?.trim() || null;
    const dateM  = (text.match(/(\d{1,2}\s+(?:JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC|ENE|FEB|MAR|ABR|MAY|JUN|JUL|AGO|SEP|OCT|NOV|DIC))/i) || [])[1] || null;
    const seller = (text.match(/^([A-ZΟÉ¬¹ΟÉβÄΑΟÉ¬çΟÉβÄ€ΟÉ≈Γ\s]+)\s+#\d/m) || [])[1]?.trim() || null;

    // Render SMALL thumbnail only (lightweight, for the list view + Firestore storage)
    const viewport = page.getViewport({ scale: 0.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    const thumb = canvas.toDataURL('image/jpeg', 0.75);

    if (shipId || packId) {
      labels.push({ id: shipId || packId, shipId, packId, sku, cp, dest, loc, dateLabel: dateM, seller, thumb, page: i, matched: false, text, pdfCacheKey: cacheKey, hdThumb: null });
    }
  }
  return labels;
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ HIGH-RES PAGE RENDER (on-demand, from in-memory PDF buffer ΟΔβ²§βÄù no upload/cloud needed) ΟΔβÄùβ²§ΟΔβÄùβ²§
async function renderHighResPage(cacheKey, pageNum) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const buf = pdfBufferCache[cacheKey];
  if (!buf) throw new Error('PDF no disponible en memoria ΟΔβ²§βÄù recargΟÉ¬Γ el PDF para ver en alta resoluciΟÉ¬≥n');

  const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
  const page = await pdf.getPage(pageNum);
  const viewport = page.getViewport({ scale: 3 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return canvas.toDataURL('image/jpeg', 0.92);
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ CAMERA QR SCANNER (for mobile, no gun scanner available) ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function CameraScanner({ onResult, onClose }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const [error, setError] = useState(null);
  const [status, setStatus] = useState('Iniciando cΟÉ¬Γmara...');
  const lastResultRef = useRef({ text: null, ts: 0 });

  useEffect(() => {
    let active = true;

    async function start() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        if (!active) { stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play();
        }
        setStatus('ApuntΟÉ¬Γ al cΟÉ¬≥digo QR');
        tick();
      } catch (err) {
        setError(err.name === 'NotAllowedError'
          ? 'Permiso de cΟÉ¬Γmara denegado. Habilitalo en la configuraciΟÉ¬≥n del navegador.'
          : 'No se pudo acceder a la cΟÉ¬Γmara: ' + err.message);
      }
    }

    function tick() {
      if (!active) return;
      const video = videoRef.current;
      const canvas = canvasRef.current;
      if (video && canvas && video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          const now = Date.now();
          // Debounce: avoid firing the same code repeatedly while still in frame
          if (code.data !== lastResultRef.current.text || now - lastResultRef.current.ts > 2500) {
            lastResultRef.current = { text: code.data, ts: now };
            onResult(code.data);
          }
        }
      }
      rafRef.current = requestAnimationFrame(tick);
    }

    start();
    return () => {
      active = false;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  return (
    <div className="overlay" onClick={onClose} style={{padding:16}}>
      <div style={{position:'relative',width:'min(94vw, 480px)',display:'flex',flexDirection:'column',alignItems:'center'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',marginBottom:8}}>
          <span style={{fontSize:13,color:error?'var(--red)':'var(--muted)'}}>{error || status}</span>
          <button className="btn btn-ghost" onClick={onClose}>ΟΔ≈™βÄΔ Cerrar</button>
        </div>
        <div style={{width:'100%',aspectRatio:'1',borderRadius:8,overflow:'hidden',border:'2px solid var(--border)',position:'relative',background:'#000'}}>
          <video ref={videoRef} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover'}} />
          <div style={{position:'absolute',inset:'15%',border:'3px solid var(--accent)',borderRadius:12,opacity:.7,pointerEvents:'none'}} />
        </div>
        <canvas ref={canvasRef} style={{display:'none'}} />
        <p style={{color:'var(--muted)',fontSize:12,marginTop:10,textAlign:'center'}}>
          La cΟÉ¬Γmara queda abierta ΟΔβ²§βÄù escaneΟÉ¬Γ un paquete tras otro sin cerrar este modal
        </p>
      </div>
    </div>
  );
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ BILLING RANGE PANEL (date-range cost summary, for paying the courier) ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function BillingRangePanel({ sessions, zones, heavySkus }) {
  const [from, setFrom] = useState('');
  const [to, setTo] = useState('');

  const inRange = sessions.filter(s => {
    if (from && s.date < from) return false;
    if (to && s.date > to) return false;
    return true;
  });

  const perSession = inRange.map(s => ({ date: s.date, cost: calcSessionCost(s.labels||[], zones, heavySkus) }));
  const grandTotal = perSession.reduce((sum, s) => sum + s.cost.total, 0);

  // Aggregate by zone across the whole range
  const zoneTotals = {};
  perSession.forEach(s => {
    s.cost.byZone.forEach(z => {
      if (!zoneTotals[z.name]) zoneTotals[z.name] = { name: z.name, count: 0, heavyCount: 0, subtotal: 0, price: z.price };
      zoneTotals[z.name].count += z.count;
      zoneTotals[z.name].heavyCount += z.heavyCount;
      zoneTotals[z.name].subtotal += z.subtotal;
    });
  });
  const zoneTotalsList = Object.values(zoneTotals).sort((a,b)=>b.subtotal-a.subtotal);

  const setQuickRange = (days) => {
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - (days - 1));
    setTo(end.toISOString().slice(0,10));
    setFrom(start.toISOString().slice(0,10));
  };

  return (
    <div className="card">
      <div className="card-title">ΟΑ≈ΗβÄô¬Α LiquidaciΟÉ¬≥n por perΟÉ¬≠odo</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-end',marginBottom:16}}>
        <div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Desde</label>
          <input type="date" className="input" value={from} onChange={e=>setFrom(e.target.value)} />
        </div>
        <div>
          <label style={{fontSize:12,color:'var(--muted)',display:'block',marginBottom:4}}>Hasta</label>
          <input type="date" className="input" value={to} onChange={e=>setTo(e.target.value)} />
        </div>
        <button className="btn btn-ghost" onClick={()=>setQuickRange(7)}>ΟÉ≈Γltimos 7 dΟÉ¬≠as</button>
        <button className="btn btn-ghost" onClick={()=>setQuickRange(15)}>ΟÉ≈Γltimos 15 dΟÉ¬≠as</button>
        <button className="btn btn-ghost" onClick={()=>setQuickRange(30)}>ΟÉ≈Γltimos 30 dΟÉ¬≠as</button>
        {(from || to) && <button className="btn btn-ghost" onClick={()=>{setFrom('');setTo('');}}>ΟΔ≈™βÄΔ Limpiar</button>}
      </div>

      {!from && !to ? (
        <p style={{color:'var(--muted)',fontSize:13}}>ElegΟÉ¬≠ un rango de fechas para calcular el total a liquidar.</p>
      ) : inRange.length === 0 ? (
        <p style={{color:'var(--muted)',fontSize:13}}>No hay sesiones guardadas en ese rango.</p>
      ) : (
        <>
          <div className="stats" style={{marginBottom:16}}>
            <div className="stat"><div className="stat-val">{inRange.length}</div><div className="stat-label">Sesiones en el perΟÉ¬≠odo</div></div>
            <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{perSession.reduce((s,x)=>s+x.cost.matchedCount,0)}</div><div className="stat-label">Total entregados</div></div>
            <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>${grandTotal.toLocaleString('es-AR')}</div><div className="stat-label">Total a liquidar</div></div>
          </div>

          {zoneTotalsList.length > 0 && (
            <div style={{overflowX:'auto',marginBottom:16}}>
              <table className="tbl">
                <thead><tr><th>Zona/Localidad</th><th>Cant. total</th><th>Pesados</th><th>Tarifa</th><th>Subtotal</th></tr></thead>
                <tbody>
                  {zoneTotalsList.map(z => (
                    <tr key={z.name}>
                      <td>{z.name}</td>
                      <td>{z.count}</td>
                      <td>{z.heavyCount > 0 ? <span className="badge badge-yellow">ΟΔ≈ΓβÄ™Ο·¬Η¬è {z.heavyCount}</span> : 'ΟΔβ²§βÄù'}</td>
                      <td>${z.price.toLocaleString('es-AR')}</td>
                      <td style={{fontWeight:700}}>${z.subtotal.toLocaleString('es-AR')}</td>
                    </tr>
                  ))}
                  <tr>
                    <td colSpan={4} style={{fontWeight:700,textAlign:'right'}}>Total del perΟÉ¬≠odo</td>
                    <td style={{fontWeight:800,color:'var(--accent)'}}>${grandTotal.toLocaleString('es-AR')}</td>
                  </tr>
                </tbody>
              </table>
            </div>

          <details>
            <summary style={{cursor:'pointer',color:'var(--muted)',fontSize:13,marginBottom:8}}>Ver desglose por dΟÉ¬≠a</summary>
            <div style={{overflowX:'auto',marginTop:8}}>
              <table className="tbl">
                <thead><tr><th>Fecha</th><th>Entregados</th><th>Costo del dΟÉ¬≠a</th></tr></thead>

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ MAIN APP ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function App() {
  const [firebaseCfg, setFirebaseCfg] = useState(getStoredConfig);
  const [db, setDb] = useState(null);
  const [storage, setStorage] = useState(null);
  const [tab, setTab] = useState('sesion');
  const [toasts, setToasts] = useState([]);

  // App state
  const [session, setSession] = useState(null);       // active session doc
  const [labels, setLabels] = useState([]);            // labels from PDFs
  const [scans, setScans] = useState([]);              // scans this session
  const [heavySkus, setHeavySkus] = useState([]);      // heavy SKU list
  const [zones, setZones] = useState([]);              // zone tariff table
  const [loading, setLoading] = useState(false);
  const [scanInput, setScanInput] = useState('');
  const [pendingModal, setPendingModal] = useState(null);
  const [imgModal, setImgModal] = useState(null);
  const [selectedLabels, setSelectedLabels] = useState([]);
  const [cameraOpen, setCameraOpen] = useState(false);
  const [sessions, setSessions] = useState([]);        // past sessions
  const scanRef = useRef(null);

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Init Firebase ΟΔβÄùβ²§ΟΔβÄùβ²§
  useEffect(() => {
    if (!firebaseCfg) return;
    try {
      let app;
      if (window.firebase.apps.length) app = window.firebase.app();
      else app = window.firebase.initializeApp(firebaseCfg);
      setDb(window.firebase.firestore(app));
      setStorage(window.firebase.storage(app));
    } catch(e) { addToast('Error Firebase','VerificΟÉ¬Γ la configuraciΟÉ¬≥n','error'); }
  }, [firebaseCfg]);

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Load data from Firestore ΟΔβÄùβ²§ΟΔβÄùβ²§
  useEffect(() => {
    if (!db) return;
    // today's session
    const today = new Date().toISOString().slice(0,10);
    db.collection('sessions').where('date','==',today).limit(1).get().then(snap => {
      if (!snap.empty) {
        const d = snap.docs[0];
        const s = { id: d.id, ...d.data() };
        setSession(s);
        setLabels(s.labels || []);
        setScans(s.scans || []);
      }
    });
    // config
    db.collection('config').doc('heavy_skus').get().then(d => { if(d.exists) setHeavySkus(d.data().list||[]); });
    db.collection('config').doc('zones').get().then(d => { if(d.exists) setZones(d.data().list||[]); });
    // past sessions
    db.collection('sessions').orderBy('date','desc').limit(30).get().then(snap => {
      setSessions(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
  }, [db]);

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Check yesterday's unmatched on load ΟΔβÄùβ²§ΟΔβÄùβ²§
  useEffect(() => {
    if (!db || !session) return;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toISOString().slice(0,10);
    db.collection('sessions').where('date','==',yStr).limit(1).get().then(snap => {
      if (snap.empty) return;
      const d = snap.docs[0].data();
      const unmatched = (d.labels||[]).filter(l => !l.matched && !l.discarded);
      if (unmatched.length > 0) {
        setPendingModal({ sessionId: snap.docs[0].id, date: yStr, items: unmatched });
      }
    });
  }, [db, session?.id]);

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Toast helpers ΟΔβÄùβ²§ΟΔβÄùβ²§
  const addToast = useCallback((title, body, type='info', actions=null) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, title, body, alarm: type==='alarm', actions }]);
    if (type === 'alarm') playAlarm();
    if (!actions) setTimeout(() => setToasts(p => p.filter(t=>t.id!==id)), 5000);
  }, []);

  const handleToastAction = useCallback((toastId, value) => {
    // value = 'add_scan' or 'ignore'
    if (value === 'add_scan' && db && session) {
      const raw = toasts.find(t=>t.id===toastId)?.scanRaw;
      if (!raw) return;
      const newScan = { raw, ts: new Date().toISOString(), matched: false, manual: true };
      const updated = [...scans, newScan];
      setScans(updated);
      db.collection('sessions').doc(session.id).update({ scans: updated });
    }
  }, [db, session, scans, toasts]);

  const dismissToast = id => setToasts(p => p.filter(t=>t.id!==id));

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Open Session ΟΔβÄùβ²§ΟΔβÄùβ²§
  const openSession = async () => {
    if (!db) return;
    const today = new Date().toISOString().slice(0,10);
    setLoading(true);
    const existing = await db.collection('sessions').where('date','==',today).limit(1).get();
    if (!existing.empty) {
      const d = existing.docs[0];
      const s = { id: d.id, ...d.data() };
      setSession(s); setLabels(s.labels||[]); setScans(s.scans||[]);
    } else {
      const ref = await db.collection('sessions').add({ date: today, open: true, labels: [], scans: [], createdAt: new Date().toISOString() });
      const s = { id: ref.id, date: today, open: true, labels: [], scans: [] };
      setSession(s); setLabels([]); setScans([]);
    }
    setLoading(false);
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Close Session ΟΔβÄùβ²§ΟΔβÄùβ²§
  const closeSession = async () => {
    if (!db || !session) return;
    setLoading(true);
    try {
      // Generate HD snapshots for unmatched labels while their PDF is still in memory,
      // so they can be viewed clearly later even after the page reloads.
      const stillUnmatched = labels.filter(l => !l.matched);
      const updatedLabels = await Promise.all(labels.map(async (l) => {
        if (l.matched || l.hdThumb || !l.pdfCacheKey) return l;
        try {
          const hd = await renderHighResPage(l.pdfCacheKey, l.page);
          return { ...l, hdThumb: hd };
        } catch {
          return l; // PDF no longer in memory, keep as-is
        }
      }));
      const toPersist = updatedLabels.map(({pdfCacheKey, ...rest}) => rest);
      await db.collection('sessions').doc(session.id).update({ labels: toPersist, open: false, closedAt: new Date().toISOString() });
      setLabels(updatedLabels);
      setSession(p => ({...p, open: false}));
      const m = updatedLabels.filter(l=>l.matched).length;
      const u = updatedLabels.filter(l=>!l.matched).length;
      addToast('SesiΟÉ¬≥n cerrada', `${m} entregados Ο²¬Ζ ${u} no entregados`);
      setSessions(p => p.map(s => s.id===session.id ? {...s,open:false,labels:toPersist} : s));
    } catch(err) {
      addToast('Error al cerrar sesiΟÉ¬≥n', err.message || 'IntentΟÉ¬Γ de nuevo', 'alarm');
    } finally {
      setLoading(false);
    }
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Upload PDFs ΟΔβÄùβ²§ΟΔβÄùβ²§
  const handlePDFDrop = async (e) => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer?.files || e.target.files).filter(f=>f.type==='application/pdf');
    if (!files.length || !session?.open) return;
    setLoading(true);
    try {
      // Read scans fresh from Firestore (not the React state) to avoid a race
      // condition where this component's `scans` hasn't finished loading yet
      // and the re-sync below would silently find nothing to match against.
      let freshScans = scans;
      try {
        const snap = await db.collection('sessions').doc(session.id).get();
        freshScans = snap.data()?.scans || [];
      } catch { /* fall back to in-memory scans if this fails */ }

      let allLabels = [...labels];
      let newlyMatchedCount = 0;
      for (const f of files) {
        addToast('Procesando PDF', f.name);
        const parsed = await parseLabelsPDF(f);
        parsed.forEach(lbl => {
          if (allLabels.find(x=>x.id===lbl.id)) return; // already present, skip
          // Re-sync: if this label's id was already scanned before (e.g. label was
          // deleted and the PDF re-uploaded), restore its matched status from scans
          const priorScan = freshScans.find(s => s.scannedId === lbl.id || s.labelId === lbl.id);
          if (priorScan) {
            lbl.matched = true;
            lbl.matchedAt = priorScan.ts;
            newlyMatchedCount++;
          }
          allLabels.push(lbl);
        });
      }
      // Check heavy SKUs
      const heavyInBatch = allLabels.filter(l => heavySkus.includes(l.sku));
      if (heavyInBatch.length > 0) {
        const locs = [...new Set(heavyInBatch.map(l=>l.loc||l.cp||'?'))].join(', ');
        addToast(`ΟΔ≈ΓβÄ™Ο·¬Η¬è ${heavyInBatch.length} envΟÉ¬≠o(s) PESADO(S)`, `Localidades: ${locs} ΟΔβ²§βÄù Pagan doble viaje`, 'alarm');
      }
      if (newlyMatchedCount > 0) {
        addToast('Escaneos restaurados', `${newlyMatchedCount} etiqueta(s) recuperaron su estado "Escaneado" segΟÉ¬Κn escaneos previos de esta sesiΟÉ¬≥n`);
      }
      setLabels(allLabels);
      // pdfCacheKey points to in-memory data only ΟΔβ²§βÄù strip it before persisting to Firestore
      const toPersist = allLabels.map(({pdfCacheKey, ...rest}) => rest);
      await db.collection('sessions').doc(session.id).update({ labels: toPersist });
      addToast('PDF cargado', `${allLabels.length} etiquetas en sesiΟÉ¬≥n`);
    } catch(err) {
      addToast('Error procesando PDF', err.message || 'OcurriΟÉ¬≥ un error inesperado', 'alarm');
    } finally {
      setLoading(false);
    }
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Scan QR ΟΔβÄùβ²§ΟΔβÄùβ²§
  const handleScan = async (raw) => {
    if (!raw.trim() || !session?.open) return;
    setScanInput('');

    // Parse scanned data
    const idMatch = raw.match(/id[ΟÉβÄ‰\[]+(\d+)/i);
    const scannedId = idMatch?.[1] || raw.trim();

    // Try to match
    const matchIdx = labels.findIndex(l => l.id === scannedId || l.shipId === scannedId || l.packId === scannedId);

    if (matchIdx === -1) {
      // No match ΟΔβ²§βÄù alarm
      const newToast = { id: Date.now()+Math.random(), title: 'ΟΑ≈Η≈Γ¬® Escaneo sin etiqueta', body: `ID: ${scannedId} ΟΔβ²§βÄù No estΟÉ¬Γ en los PDFs cargados. Ο²¬ΩAgregar como envΟÉ¬≠o manual?`, alarm: true, scanRaw: raw, actions: [{ label: 'SΟÉ¬≠, agregar', value: 'add_scan', variant: 'primary' }, { label: 'Ignorar', value: 'ignore', variant: 'ghost' }] };
      setToasts(p => [...p, newToast]);
      playAlarm();
    } else {
      // Match!
      const updLabels = labels.map((l,i) => i===matchIdx ? {...l, matched:true, matchedAt: new Date().toISOString()} : l);
      const newScan = { raw, scannedId, ts: new Date().toISOString(), matched: true, labelId: labels[matchIdx].id };
      const updScans = [...scans, newScan];
      setLabels(updLabels);
      setScans(updScans);
      await db.collection('sessions').doc(session.id).update({ labels: updLabels, scans: updScans });
      addToast('ΟΔ≈™βÄΠ Paquete registrado', `EnvΟÉ¬≠o ${scannedId} ΟΔβ²§βÄù ${labels[matchIdx].dest || labels[matchIdx].loc || ''}`);
    }
    scanRef.current?.focus();
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Computed ΟΔβÄùβ²§ΟΔβÄùβ²§
  const matched   = labels.filter(l => l.matched);
  const unmatched = labels.filter(l => !l.matched);
  const manualScans = scans.filter(s => s.manual);

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Delete label(s) ΟΔβÄùβ²§ΟΔβÄùβ²§
  const deleteLabel = async (id) => {
    if (!db || !session) return;
    const updated = labels.filter(l => l.id !== id);
    setLabels(updated);
    await db.collection('sessions').doc(session.id).update({ labels: updated });
    addToast('Etiqueta eliminada', id);
  };

  const deleteLabels = async (ids) => {
    if (!db || !session) return;
    const idSet = new Set(ids);
    const updated = labels.filter(l => !idSet.has(l.id));
    setLabels(updated);
    await db.collection('sessions').doc(session.id).update({ labels: updated });
    addToast('Etiquetas eliminadas', `${ids.length} etiqueta(s) borradas`);
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Close/Delete sessions from Historial tab (any date, not just today's) ΟΔβÄùβ²§ΟΔβÄùβ²§
  const closeSessionById = async (sessionId) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).update({ open: false, closedAt: new Date().toISOString() });
      setSessions(p => p.map(s => s.id===sessionId ? {...s, open:false} : s));
      if (session?.id === sessionId) setSession(p => ({...p, open:false}));
      addToast('SesiΟÉ¬≥n cerrada', 'Se actualizΟÉ¬≥ el estado en el historial');
    } catch(err) {
      addToast('Error', err.message || 'No se pudo cerrar la sesiΟÉ¬≥n', 'alarm');
    }
  };

  const deleteSession = async (sessionId, dateLabel) => {
    if (!db) return;
    try {
      await db.collection('sessions').doc(sessionId).delete();
      setSessions(p => p.filter(s => s.id !== sessionId));
      if (session?.id === sessionId) { setSession(null); setLabels([]); setScans([]); }
      addToast('SesiΟÉ¬≥n eliminada', dateLabel || '');
    } catch(err) {
      addToast('Error', err.message || 'No se pudo eliminar la sesiΟÉ¬≥n', 'alarm');
    }
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Pending Modal ΟΔβÄùβ²§ΟΔβÄùβ²§
  const handlePending = async (action) => {
    if (!db || !pendingModal) return;
    const updates = pendingModal.items.map(l => ({...l, discarded: action==='discard'}));
    // update that session
    const snap = await db.collection('sessions').doc(pendingModal.sessionId).get();
    const existing = snap.data().labels || [];
    const merged = existing.map(l => updates.find(u=>u.id===l.id) || l);
    await db.collection('sessions').doc(pendingModal.sessionId).update({ labels: merged });
    if (action==='keep') {
      // Bring to today
      const todayUnmatched = updates.map(l=>({...l, fromDate: pendingModal.date, matched:false}));
      const mergedToday = [...labels, ...todayUnmatched.filter(l=>!labels.find(x=>x.id===l.id))];
      setLabels(mergedToday);
      if (session) await db.collection('sessions').doc(session.id).update({ labels: mergedToday });
      addToast('Etiquetas importadas', `${todayUnmatched.length} etiqueta(s) del ${pendingModal.date} agregadas a hoy`);
    }
    setPendingModal(null);
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ RENDER ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§

  // config hardcoded, no setup needed

  const tabs = [
    {id:'sesion', label:'ΟΑ≈ΗβÄ€¬Π SesiΟÉ¬≥n'},
    {id:'escanear', label:'ΟΑ≈ΗβÄ€¬Ζ Escanear'},
    {id:'resumen', label:'ΟΑ≈ΗβÄ€≈† Resumen'},
    {id:'historial', label:'ΟΑ≈ΗβÄîβÄ€ Historial'},
    {id:'config', label:'ΟΔ≈Γβ³ΔΟ·¬Η¬è Config'},
  ];

  return (
    <div className="app">
      <ToastContainer toasts={toasts} onAction={handleToastAction} onDismiss={dismissToast} />

      {/* Pending modal */}
      {pendingModal && (
        <div className="overlay">
          <div className="modal">
            <div className="modal-title">ΟΑ≈ΗβÄ€βÄΙ Etiquetas pendientes de ayer ({pendingModal.date})</div>
            <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>
              {pendingModal.items.length} etiqueta(s) del dΟÉ¬≠a anterior no tuvieron escaneo. Ο²¬ΩQuΟÉ¬© hacemos?
            </p>
            <div style={{maxHeight:200,overflowY:'auto',marginBottom:16}}>
              {pendingModal.items.map(l => (
                <div key={l.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                  {l.thumb && <img src={l.thumb} className="label-thumb" onClick={()=>setImgModal(l)} />}
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{l.id}</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>{l.dest} Ο²¬Ζ {l.loc}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-primary" onClick={()=>handlePending('keep')}>
                ΟΑ≈ΗβÄ€¬Ξ Mantener para hoy
              </button>
              <button className="btn btn-danger" onClick={()=>handlePending('discard')}>
                ΟΑ≈ΗβÄîβÄ‰ Descartar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Image modal */}
      {imgModal && <LabelImageModal label={imgModal} onClose={()=>setImgModal(null)} />}
      {cameraOpen && <CameraScanner onResult={(data)=>{ handleScan(data); }} onClose={()=>setCameraOpen(false)} />}


      <header className="header">
        <div className="logo">
          <span className="logo-badge">FLEX</span>
          <span className="logo-text">Control de Entregas</span>
        </div>
        <div className="header-right">
          {session && (
            <span className={`badge ${session.open ? 'badge-green' : 'badge-red'}`}>
              {session.open ? 'ΟΔβÄî¬è SesiΟÉ¬≥n abierta' : 'ΟΔβÄîβÄΙ SesiΟÉ¬≥n cerrada'} {session.date}
            </span>
          )}

        </div>
      </header>

      <nav className="nav">
        {tabs.map(t => <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </nav>

      <main className="main">

        {/* ΟΔβÄùβ²§ΟΔβÄùβ²§ SESIΟÉβÄ€N TAB ΟΔβÄùβ²§ΟΔβÄùβ²§ */}
        {tab==='sesion' && (
          <>
            <div className="section-title">SesiΟÉ¬≥n del dΟÉ¬≠a</div>

            {!session ? (
              <div className="card" style={{textAlign:'center',padding:40}}>
                <div style={{fontSize:40,marginBottom:12}}>ΟΑ≈ΗβÄ€¬Π</div>
                <p style={{color:'var(--muted)',marginBottom:20}}>No hay sesiΟÉ¬≥n abierta para hoy</p>
                <button className="btn btn-primary" onClick={openSession} disabled={loading}>
                  {loading ? <span className="spinner"/> : null} Abrir sesiΟÉ¬≥n de hoy
                </button>
              </div>
            ) : (
              <>
                <div className={`session-bar ${session.open?'':'closed'}`}>
                  <div>
                    <strong>{session.date}</strong>
                    <span style={{marginLeft:12,color:'var(--muted)',fontSize:13}}>
                      {session.open ? 'SesiΟÉ¬≥n activa ΟΔβ²§βÄù podΟÉ¬©s cargar PDFs y escanear' : 'SesiΟÉ¬≥n cerrada'}
                    </span>
                  </div>
                  {session.open && (
                    <button className="btn btn-danger" onClick={closeSession}>Cerrar sesiΟÉ¬≥n</button>
                  )}
                </div>

                <div className="stats">
                  <div className="stat"><div className="stat-val">{labels.length}</div><div className="stat-label">Etiquetas cargadas</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Escaneados ΟΔ≈™βÄ€</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{unmatched.length}</div><div className="stat-label">Sin escanear</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--blue)'}}>{manualScans.length}</div><div className="stat-label">EnvΟÉ¬≠os manuales</div></div>
                </div>

                {/* Upload PDFs */}
                {session.open && (
                  <div className="card">
                    <div className="card-title">Cargar etiquetas PDF</div>
                    <div className="dropzone" onDragOver={e=>e.preventDefault()} onDrop={handlePDFDrop} onClick={()=>document.getElementById('pdfInput').click()}>
                      <div className="dropzone-icon">{loading ? 'ΟΔ¬è¬≥' : 'ΟΑ≈ΗβÄ€βÄû'}</div>
                      <div className="dropzone-text">{loading ? 'Procesando PDF...' : 'ArrastrΟÉ¬Γ los PDF de etiquetas aquΟÉ¬≠, o hacΟÉ¬© click'}</div>
                      <input id="pdfInput" type="file" accept=".pdf" multiple style={{display:'none'}} onChange={handlePDFDrop} />
                    </div>
                    {loading && <div className="progress-bar" style={{marginTop:8}}><div className="progress-fill" style={{width:'60%'}} /></div>}
                  </div>
                )}

                {/* Labels table */}
                {labels.length > 0 && (
                  <div className="card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                      <div className="card-title" style={{marginBottom:0}}>Etiquetas en sesiΟÉ¬≥n ({labels.length})</div>
                      {selectedLabels.length > 0 && (
                        <button className="btn btn-danger" style={{fontSize:12,padding:'6px 12px'}}
                          onClick={()=>{ if(confirm(`Ο²¬ΩBorrar ${selectedLabels.length} etiqueta(s) seleccionada(s)?`)){ deleteLabels(selectedLabels); setSelectedLabels([]); } }}>
                          ΟΑ≈ΗβÄîβÄ‰ Borrar {selectedLabels.length} seleccionada(s)
                        </button>
                      )}
                    </div>
                    <div style={{overflowX:'auto'}}>
                      <table className="tbl">
                        <thead><tr>
                          <th style={{width:30}}>
                            <input type="checkbox" checked={selectedLabels.length===labels.length && labels.length>0}
                              onChange={e=>setSelectedLabels(e.target.checked ? labels.map(l=>l.id) : [])} />
                          </th>
                          <th>Etiqueta</th><th>EnvΟÉ¬≠o ID</th><th>SKU</th><th>Destinatario</th><th>Localidad</th><th>CP</th><th>Estado</th><th></th>
                        </tr></thead>
                        <tbody>
                          {labels.map(l => (
                            <tr key={l.id}>
                              <td>
                                <input type="checkbox" checked={selectedLabels.includes(l.id)}
                                  onChange={e=> setSelectedLabels(p => e.target.checked ? [...p,l.id] : p.filter(x=>x!==l.id)) } />
                              </td>
                              <td>{l.thumb && <img src={l.thumb} className="label-thumb" onClick={()=>setImgModal(l)} />}</td>
                              <td style={{fontFamily:'monospace',fontSize:12}}>{l.id}</td>
                              <td><span className="chip">{l.sku||'ΟΔβ²§βÄù'}</span>{heavySkus.includes(l.sku) && <span className="badge badge-yellow" style={{marginLeft:4}}>ΟΔ≈ΓβÄ™Ο·¬Η¬è Pesado</span>}</td>
                              <td style={{fontSize:12}}>{l.dest||'ΟΔβ²§βÄù'}</td>
                              <td>{l.loc||'ΟΔβ²§βÄù'}</td>
                              <td>{l.cp||'ΟΔβ²§βÄù'}</td>
                              <td>{l.matched ? <span className="badge badge-green">ΟΔ≈™βÄ€ Escaneado</span> : <span className="badge badge-yellow">Pendiente</span>}</td>
                              <td>
                                <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:13}}
                                  title="Borrar esta etiqueta"
                                  onClick={()=>{ const msg = l.matched ? `La etiqueta ${l.id} ya fue escaneada. El registro del escaneo se conserva, pero quedarΟÉ¬Γ sin etiqueta vinculada hasta que vuelvas a cargar el PDF. Ο²¬ΩBorrar igual?` : `Ο²¬ΩBorrar la etiqueta ${l.id}?`; if(confirm(msg)) deleteLabel(l.id); }}>
                                  ΟΑ≈ΗβÄîβÄ‰
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ΟΔβÄùβ²§ΟΔβÄùβ²§ ESCANEAR TAB ΟΔβÄùβ²§ΟΔβÄùβ²§ */}
        {tab==='escanear' && (
          <>
            <div className="section-title">Escanear paquetes</div>
            {!session?.open ? (
              <div className="card empty"><div className="empty-icon">ΟΑ≈ΗβÄùβÄô</div><p>AbrΟÉ¬≠ una sesiΟÉ¬≥n para escanear</p></div>
            ) : (
              <>
                <div className="card">
                  <div className="card-title">ApuntΟÉ¬Γ la pistola lectora aquΟÉ¬≠</div>
                  <div className="scan-input-wrap">
                    <span className="scan-icon">ΟΔβÄ™¬Π</span>
                    <input
                      ref={scanRef}
                      className="input"
                      value={scanInput}
                      onChange={e=>setScanInput(e.target.value)}
                      onKeyDown={e=>{ if(e.key==='Enter') handleScan(scanInput); }}
                      placeholder="EscaneΟÉ¬Γ el QR del paquete o escribΟÉ¬≠ el ID..."
                      autoFocus
                    />
                  </div>
                  <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>La pistola lectora hace Enter automΟÉ¬Γticamente al terminar de leer el QR</p>
                  <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
                    <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
                    <span style={{color:'var(--muted)',fontSize:12}}>o</span>
                    <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
                  </div>
                  <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setCameraOpen(true)}>
                    ΟΑ≈ΗβÄ€¬Ζ Escanear con la cΟÉ¬Γmara
                  </button>
                </div>

                <div className="stats">
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Entregados a moto</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{unmatched.length}</div><div className="stat-label">Restantes</div></div>
                </div>

                {scans.length > 0 && (
                  <div className="card">
                    <div className="card-title">Escaneos de esta sesiΟÉ¬≥n ({scans.length})</div>
                    <div style={{overflowX:'auto'}}>
                      <table className="tbl">
                        <thead><tr><th>ID</th><th>Hora</th><th>Tipo</th></tr></thead>
                        <tbody>
                          {[...scans].reverse().map((s,i) => (
                            <tr key={i}>
                              <td style={{fontFamily:'monospace',fontSize:12}}>{s.scannedId || s.raw?.slice(0,30)}</td>
                              <td style={{fontSize:12,color:'var(--muted)'}}>{new Date(s.ts).toLocaleTimeString('es-AR')}</td>
                              <td>{s.manual ? <span className="badge badge-blue">Manual</span> : <span className="badge badge-green">FLEX</span>}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ΟΔβÄùβ²§ΟΔβÄùβ²§ RESUMEN TAB ΟΔβÄùβ²§ΟΔβÄùβ²§ */}
        {tab==='resumen' && (
          <>
            <div className="section-title">Resumen de sesiΟÉ¬≥n</div>
            {!session ? (
              <div className="card empty"><div className="empty-icon">ΟΑ≈ΗβÄ€≈†</div><p>No hay sesiΟÉ¬≥n activa</p></div>
            ) : (
              <>
                <div className="stats">
                  <div className="stat"><div className="stat-val">{labels.length}</div><div className="stat-label">Total etiquetas</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--green)'}}>{matched.length}</div><div className="stat-label">Entregados a moto</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--red)'}}>{unmatched.length}</div><div className="stat-label">No escaneados</div></div>
                  <div className="stat"><div className="stat-val" style={{color:'var(--accent)'}}>{labels.filter(l=>heavySkus.includes(l.sku)).length}</div><div className="stat-label">ΟΔ≈ΓβÄ™Ο·¬Η¬è Pesados</div></div>
                </div>

                {unmatched.length > 0 && (
                  <div className="card">
                    <div className="card-title" style={{color:'var(--accent)'}}>ΟΔ≈Γ¬†Ο·¬Η¬è Sin escanear ΟΔβ²§βÄù No entregados a moto</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
                      {unmatched.map(l => (
                        <div key={l.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:12,width:140,position:'relative'}}>
                          <button className="btn btn-ghost" style={{position:'absolute',top:6,right:6,padding:'3px 6px',fontSize:11,zIndex:1}}
                            title="Borrar esta etiqueta"
                            onClick={()=>{ const msg = l.matched ? `La etiqueta ${l.id} ya fue escaneada. El registro del escaneo se conserva, pero quedarΟÉ¬Γ sin etiqueta vinculada hasta que vuelvas a cargar el PDF. Ο²¬ΩBorrar igual?` : `Ο²¬ΩBorrar la etiqueta ${l.id}?`; if(confirm(msg)) deleteLabel(l.id); }}>
                            ΟΑ≈ΗβÄîβÄ‰
                          </button>
                          {l.thumb && <img src={l.thumb} style={{width:'100%',borderRadius:4,marginBottom:8,cursor:'pointer'}} onClick={()=>setImgModal(l)} />}
                          <div style={{fontSize:11,fontFamily:'monospace',wordBreak:'break-all'}}>{l.id}</div>
                          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{l.loc||l.cp||'ΟΔβ²§βÄù'}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Zone summary */}
                {zones.length > 0 && labels.length > 0 && (
                  <div className="card">
                    <div className="card-title">EstimaciΟÉ¬≥n de costo ({session.date})</div>
                    {(() => {
                      const cost = calcSessionCost(labels, zones, heavySkus);
                      if (cost.byZone.length === 0) {
                        return <p style={{color:'var(--muted)',fontSize:13}}>TodavΟÉ¬≠a no hay paquetes escaneados que coincidan con una zona configurada.</p>;
                      }
                      return (
                        <div style={{overflowX:'auto'}}>
                          <table className="tbl">
                            <thead><tr><th>Zona/Localidad</th><th>Cant.</th><th>Pesados</th><th>Tarifa</th><th>Subtotal</th></tr></thead>
                            <tbody>
                              {cost.byZone.map(z => (
                                <tr key={z.name}>
                                  <td>{z.name}</td>
                                  <td>{z.count}</td>
                                  <td>{z.heavyCount > 0 ? <span className="badge badge-yellow">ΟΔ≈ΓβÄ™Ο·¬Η¬è {z.heavyCount}</span> : 'ΟΔβ²§βÄù'}</td>
                                  <td>${z.price.toLocaleString('es-AR')}</td>
                                  <td style={{fontWeight:700}}>${z.subtotal.toLocaleString('es-AR')}</td>
                                </tr>
                              ))}
                              <tr>
                                <td colSpan={4} style={{fontWeight:700,textAlign:'right'}}>Total del dΟÉ¬≠a</td>
                                <td style={{fontWeight:800,color:'var(--accent)'}}>${cost.total.toLocaleString('es-AR')}</td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      );
                    })()}
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ΟΔβÄùβ²§ΟΔβÄùβ²§ HISTORIAL TAB ΟΔβÄùβ²§ΟΔβÄùβ²§ */}
        {tab==='historial' && (
          <>
            <div className="section-title">Historial de sesiones</div>
            {sessions.length === 0 ? (
              <div className="card empty"><div className="empty-icon">ΟΑ≈ΗβÄîβÄ€</div><p>No hay sesiones guardadas</p></div>
            ) : (
              <>
                <div className="card">
                  <div style={{overflowX:'auto'}}>
                    <table className="tbl">
                      <thead><tr><th>Fecha</th><th>Etiquetas</th><th>Escaneados</th><th>No escaneados</th><th>Costo</th><th>Estado</th><th>Acciones</th></tr></thead>
                      <tbody>
                        {sessions.map(s => {
                          const lbs = s.labels||[];
                          const sc = lbs.filter(l=>l.matched);
                          const un = lbs.filter(l=>!l.matched);
                          const cost = calcSessionCost(lbs, zones, heavySkus);
                          return (
                            <tr key={s.id}>
                              <td style={{fontWeight:600}}>{s.date}</td>
                              <td>{lbs.length}</td>
                              <td><span className="badge badge-green">{sc.length}</span></td>
                              <td>{un.length > 0 ? <span className="badge badge-yellow">{un.length}</span> : <span className="badge badge-green">0</span>}</td>
                              <td style={{fontWeight:600}}>{cost.total > 0 ? `$${cost.total.toLocaleString('es-AR')}` : 'ΟΔβ²§βÄù'}</td>
                              <td>{s.open ? <span className="badge badge-blue">Abierta</span> : <span className="badge badge-red">Cerrada</span>}</td>
                              <td>
                                <div style={{display:'flex',gap:6}}>
                                  {s.open && (
                                    <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12}}
                                      title="Cerrar esta sesiΟÉ¬≥n"
                                      onClick={()=>{ if(confirm(`Ο²¬ΩCerrar la sesiΟÉ¬≥n del ${s.date}?`)) closeSessionById(s.id); }}>
                                      ΟΑ≈ΗβÄùβÄô Cerrar
                                    </button>
                                  )}
                                  <button className="btn btn-ghost" style={{padding:'5px 9px',fontSize:12,color:'var(--red)'}}
                                    title="Eliminar esta sesiΟÉ¬≥n por completo"
                                    onClick={()=>{ if(confirm(`Ο²¬ΩEliminar definitivamente la sesiΟÉ¬≥n del ${s.date}? Esto borra sus etiquetas y escaneos guardados, no se puede deshacer.`)) deleteSession(s.id, s.date); }}>
                                    ΟΑ≈ΗβÄîβÄ‰
                                  </button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                <BillingRangePanel sessions={sessions} zones={zones} heavySkus={heavySkus} />
              </>
            )}
          </>
        )}

        {/* ΟΔβÄùβ²§ΟΔβÄùβ²§ CONFIG TAB ΟΔβÄùβ²§ΟΔβÄùβ²§ */}
        {tab==='config' && (
          <>
            <ConfigPanel db={db} heavySkus={heavySkus} setHeavySkus={setHeavySkus} zones={zones} setZones={setZones} addToast={addToast} />
          </>
        )}

      </main>
    </div>
  );
}

// ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ CONFIG PANEL ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
function ConfigPanel({ db, heavySkus, setHeavySkus, zones, setZones, addToast }) {
  const [newSku, setNewSku] = useState('');
  const [newZone, setNewZone] = useState({ name:'', cp:'', price:'' });
  const [importingSkus, setImportingSkus] = useState(false);
  const [importingZones, setImportingZones] = useState(false);

  const addSku = async () => {
    if (!newSku.trim()) return;
    const updated = [...heavySkus, newSku.trim().toUpperCase()];
    setHeavySkus(updated);
    setNewSku('');
    if (db) await db.collection('config').doc('heavy_skus').set({ list: updated });
    addToast('SKU agregado', newSku.trim().toUpperCase());
  };

  const removeSku = async (sku) => {
    const updated = heavySkus.filter(s=>s!==sku);
    setHeavySkus(updated);
    if (db) await db.collection('config').doc('heavy_skus').set({ list: updated });
  };

  const addZone = async () => {
    if (!newZone.name || !newZone.price) return;
    const z = { name: newZone.name, cp: newZone.cp, price: Number(newZone.price) };
    const updated = [...zones, z];
    setZones(updated);
    setNewZone({ name:'', cp:'', price:'' });
    if (db) await db.collection('config').doc('zones').set({ list: updated });
    addToast('Zona agregada', z.name);
  };

  const removeZone = async (name) => {
    const updated = zones.filter(z=>z.name!==name);
    setZones(updated);
    if (db) await db.collection('config').doc('zones').set({ list: updated });
  };

  // Find a column value in a row object by trying several possible header name fragments
  const findCol = (row, candidates) => {
    const keys = Object.keys(row);
    for (const cand of candidates) {
      const k = keys.find(k => k.toLowerCase().trim().includes(cand));
      if (k && row[k] !== undefined && row[k] !== '') return row[k];
    }
    return null;
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Import heavy SKUs from Excel/CSV ΟΔβÄùβ²§ΟΔβÄùβ²§
  // Expected: a column with "sku" in its header. Any other columns are ignored.
  const importSkusFromExcel = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportingSkus(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { addToast('Archivo vacΟÉ¬≠o', 'No se encontraron filas en la hoja', 'alarm'); return; }

      const found = rows
        .map(r => findCol(r, ['sku']))
        .filter(v => v !== null && String(v).trim() !== '')
        .map(v => String(v).trim().toUpperCase());

      if (!found.length) {
        addToast('No se encontrΟÉ¬≥ la columna SKU', 'Asegurate de tener una columna con encabezado "SKU"', 'alarm');
        return;
      }
      const merged = [...new Set([...heavySkus, ...found])];
      setHeavySkus(merged);
      if (db) await db.collection('config').doc('heavy_skus').set({ list: merged });
      addToast('SKUs importados', `${found.length} SKU(s) leΟÉ¬≠dos del archivo, ${merged.length} en total`);
    } catch(err) {
      addToast('Error al leer el archivo', err.message || 'RevisΟÉ¬Γ que sea un .xlsx o .csv vΟÉ¬Γlido', 'alarm');
    } finally {
      setImportingSkus(false);
      e.target.value = '';
    }
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Import zone tariffs from Excel/CSV ΟΔβÄùβ²§ΟΔβÄùβ²§
  // Expected columns (flexible headers): one with "zona"/"localidad", one with "cp"/"codigo",
  // and one with "tarifa"/"precio"/"valor"/"costo".
  const importZonesFromExcel = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportingZones(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = window.XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!rows.length) { addToast('Archivo vacΟÉ¬≠o', 'No se encontraron filas en la hoja', 'alarm'); return; }

      const parsedZones = rows.map(r => {
        const name = findCol(r, ['zona', 'localidad', 'destino', 'barrio']);
        const cp = findCol(r, ['cp', 'codigo postal', 'cΟÉ¬≥digo postal']);
        const priceRaw = findCol(r, ['tarifa', 'precio', 'valor', 'costo']);
        const price = priceRaw !== null ? Number(String(priceRaw).replace(/[^\d.,-]/g,'').replace(',','.')) : NaN;
        if (!name || isNaN(price)) return null;
        return { name: String(name).trim(), cp: cp ? String(cp).trim() : '', price };
      }).filter(Boolean);

      if (!parsedZones.length) {
        addToast('No se pudieron leer zonas', 'VerificΟÉ¬Γ que haya columnas de Zona/Localidad y Tarifa/Precio con valores numΟÉ¬©ricos', 'alarm');
        return;
      }
      // merge by name, new file overrides existing price for same zone name
      const merged = [...zones];
      parsedZones.forEach(z => {
        const idx = merged.findIndex(m => m.name.toLowerCase() === z.name.toLowerCase());
        if (idx >= 0) merged[idx] = z; else merged.push(z);
      });
      setZones(merged);
      if (db) await db.collection('config').doc('zones').set({ list: merged });
      addToast('Zonas importadas', `${parsedZones.length} zona(s) leΟÉ¬≠das del archivo, ${merged.length} en total`);
    } catch(err) {
      addToast('Error al leer el archivo', err.message || 'RevisΟÉ¬Γ que sea un .xlsx o .csv vΟÉ¬Γlido', 'alarm');
    } finally {
      setImportingZones(false);
      e.target.value = '';
    }
  };

  return (
    <>
      <div className="section-title">ConfiguraciΟÉ¬≥n</div>

      {/* Heavy SKUs */}
      <div className="card">
        <div className="card-title">ΟΔ≈ΓβÄ™Ο·¬Η¬è SKUs de envΟÉ¬≠os pesados (pagan doble)</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
          {heavySkus.length === 0 && <span style={{color:'var(--muted)',fontSize:13}}>No hay SKUs cargados</span>}
          {heavySkus.map(s => (
            <span key={s} className="chip" style={{cursor:'pointer'}} onClick={()=>removeSku(s)}>
              {s} <span style={{color:'var(--red)',marginLeft:4}}>ΟΔ≈™βÄΔ</span>
            </span>
          ))}
        </div>
        <div className="input-row">
          <input className="input" placeholder="Ej: A158WA-1D" value={newSku} onChange={e=>setNewSku(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSku()} />
          <button className="btn btn-primary" onClick={addSku}>Agregar</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
          <span style={{color:'var(--muted)',fontSize:12}}>o</span>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
        </div>
        <label className="btn btn-ghost" style={{width:'100%',justifyContent:'center',cursor:'pointer'}}>
          {importingSkus ? <span className="spinner"/> : 'ΟΑ≈ΗβÄ€βÄö'} Importar desde Excel/CSV
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importSkusFromExcel} disabled={importingSkus} />
        </label>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>El archivo debe tener una columna con encabezado "SKU"</p>
      </div>

      {/* Zones */}
      <div className="card">
        <div className="card-title">ΟΑ≈ΗβÄî¬Κ Tarifas por zona/localidad</div>
        {zones.length > 0 && (
          <div style={{overflowX:'auto',marginBottom:16}}>
            <table className="tbl">
              <thead><tr><th>Zona/Localidad</th><th>CP</th><th>Tarifa ($)</th><th></th></tr></thead>
              <tbody>
                {zones.map(z => (
                  <tr key={z.name}>
                    <td>{z.name}</td>
                    <td>{z.cp||'ΟΔβ²§βÄù'}</td>
                    <td>${z.price.toLocaleString('es-AR')}</td>
                    <td><button className="btn btn-ghost" style={{padding:'4px 8px',fontSize:12}} onClick={()=>removeZone(z.name)}>ΟΔ≈™βÄΔ</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px 120px auto',gap:8,alignItems:'center'}}>
          <input className="input" placeholder="Localidad" value={newZone.name} onChange={e=>setNewZone(p=>({...p,name:e.target.value}))} />
          <input className="input" placeholder="CP" value={newZone.cp} onChange={e=>setNewZone(p=>({...p,cp:e.target.value}))} />
          <input className="input" placeholder="$ tarifa" type="number" value={newZone.price} onChange={e=>setNewZone(p=>({...p,price:e.target.value}))} />
          <button className="btn btn-primary" onClick={addZone}>Agregar</button>
        </div>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:10}}>Los envΟÉ¬≠os pesados se calculan como tarifa ΟÉβÄî 2</p>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
          <span style={{color:'var(--muted)',fontSize:12}}>o</span>
          <div style={{flex:1,borderTop:'1px solid var(--border)'}} />
        </div>
        <label className="btn btn-ghost" style={{width:'100%',justifyContent:'center',cursor:'pointer'}}>
          {importingZones ? <span className="spinner"/> : 'ΟΑ≈ΗβÄ€βÄö'} Importar desde Excel/CSV
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={importZonesFromExcel} disabled={importingZones} />
        </label>
        <p style={{color:'var(--muted)',fontSize:12,marginTop:8}}>Columnas esperadas: Zona/Localidad, CP (opcional), Tarifa/Precio. Si una zona ya existe, se actualiza su tarifa.</p>
      </div>

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
